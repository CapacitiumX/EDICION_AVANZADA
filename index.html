<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapacitiumX Studio V17 - Edición en Vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #3b82f6; --bg: #050507; --panel: #121216; --track-bg: #1f1f23; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; user-select: none; }

        .app-header { background: var(--panel); padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-weight: 600; font-size: 14px; align-items: center; }
        .btn-save { background: linear-gradient(90deg, #10b981, #059669); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .autosave-badge { font-size: 10px; color: #888; display: flex; align-items: center; gap: 5px; }
        
        .preview-area { background: #000; display: flex; justify-content: center; padding: 10px; height: 30vh; border-bottom: 1px solid #333; position: relative; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; border-radius: 8px; background: #0a0a0a; object-fit: contain; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .status-rec { position: absolute; top: 15px; right: 20px; background: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: none; animation: pulse 1.5s infinite; z-index: 50; }

        .timeline-editor { background: var(--panel); display: flex; flex-direction: column; height: 32vh; border-bottom: 1px solid #333; }
        .timeline-toolbar { display: flex; gap: 15px; padding: 10px 12px; background: #000; font-size: 14px; align-items: center; border-bottom: 1px solid #222; }
        .action-btn { cursor: pointer; color: #a1a1aa; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: white; transform: scale(1.1); }
        .action-btn.active-play { color: #10b981; }

        .tracks-container { flex: 1; padding: 10px 0; overflow-x: auto; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; position: relative; }
        .track { height: 40px; background: var(--track-bg); display: flex; position: relative; min-width: 300vw; border-bottom: 1px solid #2a2a30; }
        .track-label { position: sticky; left: 0; background: #0a0a0c; width: 45px; display: flex; justify-content: center; align-items: center; font-size: 10px; z-index: 30; border-right: 1px solid #444; flex-direction: column; color: #aaa; font-weight: bold; }
        
        .export-zone { position: absolute; top: 0; bottom: 0; background: rgba(16, 185, 129, 0.1); z-index: 5; pointer-events: none; border-top: 2px solid #10b981; border-bottom: 2px solid #eab308; }
        .marker-in { position: absolute; top: 0; bottom: 0; width: 4px; background: #10b981; z-index: 35; cursor: ew-resize; }
        .marker-in::before { content: 'INICIO'; position: absolute; top: -10px; left: 0; background: #10b981; font-size: 8px; padding: 2px 4px; border-radius: 2px; color: white; font-weight: bold; }
        .marker-out { position: absolute; top: 0; bottom: 0; width: 4px; background: #eab308; z-index: 35; cursor: ew-resize; box-shadow: 0 0 10px rgba(234, 179, 8, 0.8); }
        .marker-out::before { content: 'FIN DE VIDEO'; position: absolute; top: -10px; left: -30px; background: #eab308; font-size: 8px; padding: 2px 4px; border-radius: 2px; color: black; font-weight: bold; }

        .playhead-container { position: absolute; top: 0; bottom: 0; left: 45px; width: 20px; z-index: 40; transform: translateX(-10px); cursor: ew-resize; }
        .playhead-line { position: absolute; left: 10px; width: 2px; height: 100%; background: #ffffff; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .playhead-head { position: absolute; left: 5px; top: 0; width: 12px; height: 12px; background: #ffffff; clip-path: polygon(0 0, 100% 0, 50% 100%); pointer-events: none; }

        .clip-block { position: absolute; height: 90%; top: 5%; background: linear-gradient(135deg, #2563eb, #3b82f6); border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: bold; opacity: 0.95; overflow: hidden; white-space: nowrap; border: 1px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 20; transition: border 0.1s; }
        .clip-block.image { background: linear-gradient(135deg, #d97706, #f59e0b); border-color: #fbbf24; }
        .clip-block.audio { background: linear-gradient(135deg, #059669, #10b981); border-color: #34d399; }
        .clip-block.text { background: linear-gradient(135deg, #7c3aed, #8b5cf6); border-color: #a78bfa; }
        .clip-block.offline { background: #333 !important; border-color: #555 !important; color: #ef4444; border-style: dashed; }
        .clip-block.selected { border: 2px solid white; opacity: 1; z-index: 25; box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        
        .fx-badge { position: absolute; bottom: 2px; right: 15px; font-size: 8px; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 2px; display: none; color: #fbbf24; }
        .clip-block.has-fx .fx-badge { display: block; }

        .resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 15px; background: rgba(255,255,255,0.1); cursor: ew-resize; z-index: 30; border-left: 1px solid rgba(255,255,255,0.3); border-radius: 0 4px 4px 0; }
        .drag-area { flex: 1; height: 100%; display: flex; align-items: center; cursor: grab; }
        .drag-area:active { cursor: grabbing; }

        .control-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .tab-menu { display: flex; background: var(--panel); overflow-x: auto; border-bottom: 1px solid #333; }
        .tab-btn { padding: 12px 16px; font-size: 12px; color: #a1a1aa; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--neon); background: rgba(59, 130, 246, 0.1); }
        .tab-content { flex: 1; padding: 15px; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .btn { background: #27272a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; font-size: 12px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #333; }
        .btn.primary { background: var(--neon); border: none; }
        .btn.primary:hover { background: #2563eb; }
        .btn.danger { background: #ef4444; border: none; }
        select, input[type="text"], input[type="color"] { background: #18181c; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%; box-sizing: border-box; outline: none; }
        select:focus, input[type="text"]:focus { border-color: var(--neon); }
        input[type="range"] { width: 100%; accent-color: var(--neon); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #hidden-media-container { display: none; }
        
        .project-list { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; }
        .project-item { background: #18181c; padding: 10px; border-radius: 6px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <span><i class="fa-solid fa-crown" style="color: #fbbf24;"></i> Estudio Pro V17</span>
            <div class="autosave-badge" id="saveIndicator"><i class="fa-solid fa-cloud"></i> Guardado</div>
        </div>
        <button class="btn-save" id="btnExport" onclick="exportVideo()"><i class="fa-solid fa-rocket"></i> EXPORTAR HASTA LÍNEA AMARILLA</button>
    </div>

    <div class="preview-area">
        <div class="status-rec" id="recBadge">GRABANDO</div>
        <canvas id="mainCanvas"></canvas>
        <video id="hiddenCam" autoplay playsinline style="display:none;" muted></video>
        <div id="hidden-media-container"></div>
    </div>

    <div class="timeline-editor">
        <div class="timeline-toolbar">
            <i class="fa-solid fa-play action-btn" id="btnPlay" onclick="togglePlayback()" title="Reproducir/Pausar"></i>
            <i class="fa-solid fa-backward action-btn" onclick="resetPlayhead()" title="Ir al Inicio"></i>
            <div style="width: 1px; height: 15px; background: #555; margin: 0 10px;"></div>
            
            <i class="fa-solid fa-scissors action-btn" onclick="splitSelectedClip()" title="Corte Quirúrgico (Tijeras)" style="color: #f59e0b;"></i>
            <i class="fa-solid fa-copy action-btn" onclick="duplicateSelectedClip()" title="Duplicar Capa"></i>
            <i class="fa-solid fa-trash action-btn" onclick="deleteSelectedClip()" title="Eliminar Capa" style="color: #ef4444;"></i>
            <span id="timecode" style="margin-left: auto; font-family: monospace; color: #10b981;">00:00.0</span>
        </div>
        
        <div class="tracks-container" id="timelineScroll">
            <!-- DELIMITADORES -->
            <div class="export-zone" id="exportZone"></div>
            <div class="marker-in" id="markerIn"></div>
            <div class="marker-out" id="markerOut"></div>

            <div class="playhead-container" id="playhead">
                <div class="playhead-head"></div>
                <div class="playhead-line"></div>
            </div>
            
            <div class="track" id="videoTrack"><div class="track-label"><i class="fa-solid fa-video"></i> Vid</div></div>
            <div class="track" id="imageTrack"><div class="track-label"><i class="fa-solid fa-image"></i> Img</div></div>
            <div class="track" id="textTrack"><div class="track-label"><i class="fa-solid fa-font"></i> Txt</div></div>
            <div class="track" id="audioTrack"><div class="track-label"><i class="fa-solid fa-microphone"></i> Voz</div></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="tab-menu">
            <div class="tab-btn active" onclick="switchTab('media')"><i class="fa-solid fa-folder-open"></i> Medios</div>
            <div class="tab-btn" onclick="switchTab('fx')"><i class="fa-solid fa-wand-magic-sparkles"></i> Textos y FX</div>
            <div class="tab-btn" onclick="switchTab('projects')"><i class="fa-solid fa-floppy-disk"></i> Historial</div>
        </div>

        <!-- MEDIOS -->
        <div id="media" class="tab-content active">
            <div class="btn primary" onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-film"></i> Importar Video / Foto Base</div>
            <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none;" onchange="addMediaToTimeline(event)">
            
            <div style="background: #121216; padding: 10px; border-radius: 6px; margin-top: 5px; border: 1px solid #333;">
                <label style="font-size: 11px; color: #aaa;">Volumen del Video Original (Ideal para Doblaje)</label>
                <input type="range" id="masterVolume" min="0" max="100" value="100" oninput="updateMasterVolume()">
            </div>
            <p style="font-size: 10px; color: #888; text-align: center;">Mueve la <b>línea amarilla</b> para indicarle al sistema dónde debe detener la grabación automáticamente al exportar.</p>
        </div>

        <!-- TEXTOS Y FX (EDICIÓN EN VIVO) -->
        <div id="fx" class="tab-content">
            <div style="background: #121216; padding: 10px; border-radius: 6px; border: 1px solid #3b82f6;">
                <label style="font-size: 11px; color: #3b82f6; font-weight: bold;">Editor de Texto (Toca un texto morado para editarlo en vivo)</label>
                <input type="text" id="overlayText" placeholder="Escribe tu título..." style="margin-bottom: 5px;" oninput="liveUpdateText()">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <div><label style="font-size: 9px; color: #888;">Fuente</label><select id="textFont" onchange="liveUpdateText()"><option value="sans-serif">Arial</option><option value="serif">Times</option><option value="Impact">Impact</option><option value="Courier New">Máquina Escribir</option></select></div>
                    <div><label style="font-size: 9px; color: #888;">Color Letra</label><input type="color" id="overlayColor" value="#ffffff" oninput="liveUpdateText()"></div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; align-items: center;">
                    <div>
                        <label style="font-size: 9px; color: #888;">¿Fondo en el Texto?</label>
                        <select id="useBgOption" onchange="liveUpdateText()">
                            <option value="transparent">Sin Fondo</option>
                            <option value="color">Con Fondo de Color</option>
                        </select>
                    </div>
                    <div><label style="font-size: 9px; color: #888;">Color de Fondo</label><input type="color" id="overlayBg" value="#e50000" oninput="liveUpdateText()"></div>
                </div>
                <button class="btn primary" onclick="addTextToTimeline()" style="width: 100%; margin-top: 10px; padding: 8px;"><i class="fa-solid fa-plus"></i> Crear Nueva Capa de Texto</button>
            </div>
            
            <div class="grid-2" style="margin-top: 10px;">
                <button class="btn primary" onclick="document.getElementById('stickerUpload').click()"><i class="fa-solid fa-image"></i> Añadir Foto/Sticker</button>
                <div>
                    <label style="font-size: 11px; color: #aaa;">Tamaño Texto/Sticker</label>
                    <input type="range" id="elementSize" min="10" max="800" value="60" oninput="updateSelectedOverlaySize()">
                </div>
            </div>
            <input type="file" id="stickerUpload" accept="image/*" style="display:none;" onchange="addStickerToTimeline(event)">
        </div>

        <!-- PROYECTOS / AUTOGUARDADO -->
        <div id="projects" class="tab-content">
            <div style="background: #121216; padding: 15px; border-radius: 6px; border: 1px solid #10b981;">
                <label style="font-size: 11px; color: #aaa;">Nombrar Proyecto Actual</label>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <input type="text" id="projectName" placeholder="Ej: Video Monterreyense..." value="Proyecto Sin Título">
                    <button class="btn primary" onclick="forceSaveProject()"><i class="fa-solid fa-save"></i> Guardar</button>
                </div>
            </div>
            
            <h4 style="font-size: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 10px 0 5px 0;">Historial de Proyectos</h4>
            <div class="project-list" id="projectListDisplay">
                <!-- Se llena vía JS -->
            </div>
            <div class="btn danger" onclick="clearProjects()" style="margin-top: 10px;"><i class="fa-solid fa-trash"></i> Borrar Todo el Historial</div>
        </div>
    </div>

    <script>
        let audioCtx; let audioMixer; 
        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioMixer = audioCtx.createMediaStreamDestination(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d'); canvas.width = 1280; canvas.height = 720;
        const hiddenCam = document.getElementById('hiddenCam'); const mediaContainer = document.getElementById('hidden-media-container');
        
        let projectClips = []; 
        let selectedClipEl = null; let isDraggingOverlay = false; let isExporting = false;

        // --- SISTEMA DE AUTOGUARDADO AVANZADO (Base64 para imágenes) ---
        let currentProjectId = Date.now().toString();

        function triggerAutosave() {
            const ind = document.getElementById('saveIndicator');
            ind.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
            
            let saveData = projectClips.map(c => {
                return {
                    id: c.id, type: c.type, startPx: c.startPx, widthPx: c.widthPx, offsetPx: c.offsetPx,
                    content: c.content, color: c.color, font: c.font, useBg: c.useBg, bgColor: c.bgColor,
                    x: c.x, y: c.y, size: c.size, filter: c.filter, anim: c.anim, ratio: c.ratio,
                    base64Data: c.base64Data || null, // Guarda la imagen convertida a código
                    isOffline: (c.type === 'video' || c.type === 'audio') 
                };
            });

            let projName = document.getElementById('projectName').value;
            let projectInfo = { id: currentProjectId, name: projName, date: new Date().toLocaleString(), markers: { in: inMarkerX, out: outMarkerX }, clips: saveData };
            
            let allProjects = JSON.parse(localStorage.getItem('capacitiumProjects') || '[]');
            let existingIdx = allProjects.findIndex(p => p.id === currentProjectId);
            if(existingIdx >= 0) { allProjects[existingIdx] = projectInfo; } else { allProjects.push(projectInfo); }
            
            try {
                localStorage.setItem('capacitiumProjects', JSON.stringify(allProjects));
                setTimeout(() => { ind.innerHTML = '<i class="fa-solid fa-check" style="color:#10b981;"></i> Guardado'; loadProjectList(); }, 500);
            } catch (e) {
                // Si la imagen es muy grande, la memoria local se llena
                ind.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444;"></i> Memoria Llena';
                alert("Atención: Has subido demasiadas imágenes pesadas y la memoria temporal del navegador se llenó. Las últimas imágenes no se guardaron en el historial, pero puedes seguir editando.");
            }
        }

        function forceSaveProject() { triggerAutosave(); }

        function loadProjectList() {
            const container = document.getElementById('projectListDisplay'); container.innerHTML = '';
            let allProjects = JSON.parse(localStorage.getItem('capacitiumProjects') || '[]');
            allProjects.reverse().forEach(p => {
                let div = document.createElement('div'); div.className = 'project-item';
                div.innerHTML = `<div><strong>${p.name}</strong><br><span style="font-size:8px; color:#888;">${p.date}</span></div> <button class="btn primary" style="padding: 4px 8px;" onclick="loadProject('${p.id}')">Cargar</button>`;
                container.appendChild(div);
            });
        }
        
        function clearProjects() { if(confirm("¿Borrar todo el historial?")) { localStorage.removeItem('capacitiumProjects'); loadProjectList(); } }

        function loadProject(id) {
            let allProjects = JSON.parse(localStorage.getItem('capacitiumProjects') || '[]');
            let p = allProjects.find(x => x.id === id); if(!p) return;
            
            document.getElementById('videoTrack').innerHTML = '<div class="track-label"><i class="fa-solid fa-video"></i> Vid</div>';
            document.getElementById('imageTrack').innerHTML = '<div class="track-label"><i class="fa-solid fa-image"></i> Img</div>';
            document.getElementById('textTrack').innerHTML = '<div class="track-label"><i class="fa-solid fa-font"></i> Txt</div>';
            document.getElementById('audioTrack').innerHTML = '<div class="track-label"><i class="fa-solid fa-microphone"></i> Voz</div>';
            mediaContainer.innerHTML = ''; projectClips = [];

            currentProjectId = p.id; document.getElementById('projectName').value = p.name;
            inMarkerX = p.markers.in || 45; outMarkerX = p.markers.out || 300; updateExportZone();

            p.clips.forEach(c => {
                const clipUi = document.createElement('div');
                clipUi.className = `clip-block ${c.type === 'text' ? 'text' : (c.type === 'audio' ? 'audio' : (c.type === 'image' || c.type === 'sticker' ? 'image' : ''))}`;
                
                // Si es imagen/sticker y tiene base64, recuperarlo. Si no, marcar offline
                let domEl = null; let imgObj = null;
                if ((c.type === 'image' || c.type === 'sticker') && c.base64Data) {
                    let img = new Image(); img.src = c.base64Data;
                    if(c.type === 'image') domEl = img; else imgObj = img;
                    c.isOffline = false;
                }

                if(c.isOffline) clipUi.classList.add('offline');
                clipUi.style.left = c.startPx + 'px'; clipUi.style.width = c.widthPx + 'px'; clipUi.setAttribute('data-id', c.id);
                
                let icon = c.type === 'video' ? 'film' : (c.type === 'audio' ? 'microphone' : (c.type === 'text' ? 'font' : 'image'));
                let title = c.type === 'text' ? c.content.substring(0,6) : (c.isOffline ? 'Toca para reconectar' : (c.type === 'sticker' ? 'Sticker' : 'Foto'));
                clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-${icon}"></i> &nbsp;${title}</div>`;
                
                makeDraggable(clipUi, false, c.id); makeResizable(clipUi, c.id);
                clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
                
                if(c.isOffline) {
                    clipUi.addEventListener('dblclick', () => {
                        let input = document.createElement('input'); input.type = 'file'; input.accept = c.type === 'audio' ? 'audio/*,video/*' : 'image/*,video/*';
                        input.onchange = (e) => {
                            let file = e.target.files[0]; if(!file) return; let url = URL.createObjectURL(file);
                            let mediaEl;
                            if(c.type === 'video' || c.type === 'audio') { mediaEl = document.createElement('video'); mediaEl.src = url; mediaEl.crossOrigin = "anonymous"; mediaContainer.appendChild(mediaEl); } 
                            else { mediaEl = new Image(); mediaEl.src = url; }
                            let found = projectClips.find(pc => pc.id == c.id);
                            if(found) { found.domElement = mediaEl; found.isOffline = false; clipUi.classList.remove('offline'); clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-${icon}"></i> &nbsp;${file.name.substring(0,6)}</div>`; triggerAutosave(); }
                        }; input.click();
                    });
                }

                let trackId = c.type === 'text' ? 'textTrack' : (c.type === 'audio' ? 'audioTrack' : (c.type === 'sticker' || c.type === 'image' ? 'imageTrack' : 'videoTrack'));
                document.getElementById(trackId).appendChild(clipUi);

                projectClips.push({...c, domElement: domEl, imgObj: imgObj});
            });
            resetPlayhead(); 
        }

        // --- SISTEMA DE MARCADORES (LÍNEA AMARILLA) ---
        let inMarkerX = 45; let outMarkerX = 300; 
        function updateExportZone() { document.getElementById('markerIn').style.left = inMarkerX + 'px'; document.getElementById('markerOut').style.left = outMarkerX + 'px'; document.getElementById('exportZone').style.left = inMarkerX + 'px'; document.getElementById('exportZone').style.width = Math.max(0, outMarkerX - inMarkerX) + 'px'; triggerAutosave(); }
        updateExportZone();

        function makeMarkerDraggable(element, type) {
            let startX = 0, currentLeft = 0;
            function dragStart(e) { e.preventDefault(); startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; currentLeft = parseInt(element.style.left || 45); document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove, {passive: false}); document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd); }
            function dragMove(e) { e.preventDefault(); let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; let newLeft = currentLeft + (x - startX); if(newLeft < 45) newLeft = 45;
                if(type === 'in') { if (newLeft > outMarkerX - 10) newLeft = outMarkerX - 10; inMarkerX = newLeft; } else { if (newLeft < inMarkerX + 10) newLeft = inMarkerX + 10; outMarkerX = newLeft; } updateExportZone();
            }
            function dragEnd(e) { document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove); document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd); }
            element.addEventListener('mousedown', dragStart); element.addEventListener('touchstart', dragStart, {passive: false});
        }
        makeMarkerDraggable(document.getElementById('markerIn'), 'in'); makeMarkerDraggable(document.getElementById('markerOut'), 'out');

        function updateMasterVolume() { let vol = document.getElementById('masterVolume').value / 100; projectClips.forEach(c => { if (c.type === 'video' && c.domElement) c.domElement.volume = vol; }); }

        // --- CORTAR Y DUPLICAR ---
        function splitSelectedClip() {
            if(!selectedClipEl) return alert("Selecciona un clip para cortarlo.");
            const id = selectedClipEl.getAttribute('data-id'); const orig = projectClips.find(c => c.id == id);
            if(!orig || playheadX <= orig.startPx || playheadX >= orig.startPx + orig.widthPx) { return alert("Coloca la línea de reproducción blanca sobre el clip."); }

            const leftWidth = playheadX - orig.startPx; const rightWidth = orig.widthPx - leftWidth; const newId = Date.now();
            orig.widthPx = leftWidth; selectedClipEl.style.width = leftWidth + 'px';

            const clipUi = document.createElement('div'); clipUi.className = selectedClipEl.className; clipUi.classList.remove('selected'); clipUi.style.left = playheadX + 'px'; clipUi.style.width = rightWidth + 'px'; clipUi.setAttribute('data-id', newId); clipUi.innerHTML = selectedClipEl.innerHTML;
            makeDraggable(clipUi, false, newId); makeResizable(clipUi, newId); clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true}); selectedClipEl.parentElement.appendChild(clipUi);

            let newOffset = orig.offsetPx + leftWidth; let newDom = orig.domElement; 
            if (orig.type === 'video' || orig.type === 'audio') {
                newDom = orig.domElement.cloneNode(true); newDom.volume = orig.domElement.volume; mediaContainer.appendChild(newDom);
                if (orig.type === 'video') { newDom.oncanplay = () => { if (!newDom.hasAudioConnected) { try { const source = audioCtx.createMediaElementSource(newDom); source.connect(audioCtx.destination); source.connect(audioMixer); newDom.hasAudioConnected = true; } catch(e) {} } }; }
            }
            projectClips.push({ ...orig, id: newId, startPx: playheadX, widthPx: rightWidth, offsetPx: newOffset, domElement: newDom });
            triggerAutosave();
        }

        // --- EDICIÓN EN VIVO DE TEXTO ---
        function liveUpdateText() {
            if(selectedClipEl) {
                const id = selectedClipEl.getAttribute('data-id'); let clipObj = projectClips.find(c => c.id == id);
                if(clipObj && clipObj.type === 'text') {
                    clipObj.content = document.getElementById('overlayText').value || "Texto";
                    clipObj.color = document.getElementById('overlayColor').value;
                    clipObj.bgColor = document.getElementById('overlayBg').value;
                    clipObj.font = document.getElementById('textFont').value;
                    clipObj.useBg = document.getElementById('useBgOption').value === 'color';
                    selectedClipEl.querySelector('.drag-area').innerHTML = `<i class="fa-solid fa-font"></i> &nbsp;${clipObj.content.substring(0,6)}`;
                    triggerAutosave();
                }
            }
        }

        function selectClip(e) {
            if(selectedClipEl) selectedClipEl.classList.remove('selected'); selectedClipEl = e.currentTarget; selectedClipEl.classList.add('selected');
            const id = selectedClipEl.getAttribute('data-id'); const c = projectClips.find(clip => clip.id == id);
            if(c) {
                if(c.type === 'text' || c.type === 'sticker') document.getElementById('elementSize').value = c.size;
                // Cargar datos en los inputs para edición en vivo
                if(c.type === 'text') {
                    document.getElementById('overlayText').value = c.content;
                    document.getElementById('overlayColor').value = c.color;
                    document.getElementById('overlayBg').value = c.bgColor || '#000000';
                    document.getElementById('textFont').value = c.font || 'sans-serif';
                    document.getElementById('useBgOption').value = c.useBg ? 'color' : 'transparent';
                }
            }
        }

        function addTextToTimeline() {
            const clipId = Date.now(); const clipUi = document.createElement('div'); clipUi.className = 'clip-block text'; clipUi.style.left = playheadX + 'px'; clipUi.style.width = '150px'; clipUi.setAttribute('data-id', clipId); clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-font"></i> &nbsp;Nuevo</div>`;
            makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId); clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true}); document.getElementById('textTrack').appendChild(clipUi);

            projectClips.push({ id: clipId, type: 'text', content: "Nuevo Texto", color: "#ffffff", font: "sans-serif", useBg: false, bgColor: "#000000", x: 640, y: 360, size: 80, startPx: playheadX, widthPx: 150, offsetPx: 0, filter: 'none', anim: 'none', isOffline: false });
            
            // Simular click para seleccionarlo y poder editarlo en vivo
            clipUi.dispatchEvent(new Event('mousedown'));
            document.getElementById('overlayText').value = "Nuevo Texto";
            document.getElementById('overlayText').focus();

            let endClip = playheadX + 150; if (endClip > outMarkerX) { outMarkerX = endClip; updateExportZone(); } playheadX += 160; document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode();
            triggerAutosave();
        }

        // --- CONVERTIR IMAGEN A BASE64 PARA AUTOGUARDADO ---
        function getBase64(file, callback) {
            var reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function () { callback(reader.result); };
        }

        function addMediaToTimeline(event) {
            initAudio(); const file = event.target.files[0]; if (!file) return; const isVideo = file.type.startsWith('video/'); const url = URL.createObjectURL(file); const clipId = Date.now();
            const clipUi = document.createElement('div'); clipUi.className = `clip-block ${isVideo ? '' : 'image'}`; clipUi.style.left = playheadX + 'px'; clipUi.style.width = '150px'; clipUi.setAttribute('data-id', clipId); clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-${isVideo ? 'film' : 'image'}"></i> &nbsp;${file.name.substring(0,8)}</div>`;
            makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId); clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true}); document.getElementById(isVideo ? 'videoTrack' : 'imageTrack').appendChild(clipUi);
            
            let mediaElement; let base64Data = null;
            if(isVideo) {
                mediaElement = document.createElement('video'); mediaElement.src = url; mediaElement.playsInline = true; mediaElement.crossOrigin = "anonymous"; mediaElement.volume = document.getElementById('masterVolume').value / 100; mediaContainer.appendChild(mediaElement);
                mediaElement.oncanplay = () => { if (!mediaElement.hasAudioConnected) { try { const source = audioCtx.createMediaElementSource(mediaElement); source.connect(audioCtx.destination); source.connect(audioMixer); mediaElement.hasAudioConnected = true; } catch(e) {} } };
                pushMediaObj(clipId, 'video', mediaElement, null, null);
            } else { 
                mediaElement = new Image(); mediaElement.src = url; 
                getBase64(file, (b64) => { 
                    pushMediaObj(clipId, 'image', mediaElement, null, b64); 
                });
            }
        }

        function addStickerToTimeline(event) {
            const file = event.target.files[0]; if (!file) return; const img = new Image(); const url = URL.createObjectURL(file); img.src = url;
            img.onload = () => {
                const clipId = Date.now(); const clipUi = document.createElement('div'); clipUi.className = 'clip-block image'; clipUi.style.left = playheadX + 'px'; clipUi.style.width = '100px'; clipUi.setAttribute('data-id', clipId); clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-face-smile"></i> &nbsp;Sticker</div>`;
                makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId); clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true}); document.getElementById('textTrack').appendChild(clipUi); 
                
                getBase64(file, (b64) => {
                    projectClips.push({ id: clipId, type: 'sticker', imgObj: img, ratio: img.height / img.width, x: 640, y: 360, size: 300, startPx: playheadX, widthPx: 100, offsetPx: 0, filter: 'none', anim: 'none', isOffline: false, base64Data: b64 });
                    triggerAutosave();
                });
                
                let endClip = playheadX + 100; if (endClip > outMarkerX) { outMarkerX = endClip; updateExportZone(); } playheadX += 110; document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode();
            }; 
        }

        function pushMediaObj(id, type, domElement, imgObj, b64) {
            projectClips.push({ id: id, type: type, startPx: playheadX, widthPx: 150, offsetPx: 0, domElement: domElement, imgObj: imgObj, filter: 'none', anim: 'none', isOffline: false, base64Data: b64 });
            let endClip = playheadX + 150; if (endClip > outMarkerX) { outMarkerX = endClip; updateExportZone(); } playheadX += 160; document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode(); triggerAutosave();
        }

        function duplicateSelectedClip() {
            if (!selectedClipEl) return;
            const id = selectedClipEl.getAttribute('data-id'); const original = projectClips.find(c => c.id == id);
            if (original && (original.type === 'text' || original.type === 'sticker')) {
                const newId = Date.now(); const clipUi = document.createElement('div'); clipUi.className = selectedClipEl.className; clipUi.style.left = playheadX + 'px'; clipUi.style.width = original.widthPx + 'px'; clipUi.setAttribute('data-id', newId); clipUi.innerHTML = selectedClipEl.innerHTML;
                makeDraggable(clipUi, false, newId); makeResizable(clipUi, newId); clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true}); selectedClipEl.parentElement.appendChild(clipUi);
                projectClips.push({...original, id: newId, startPx: playheadX, y: original.y + 40, offsetPx: 0});
                let endClip = playheadX + original.widthPx; if (endClip > outMarkerX) { outMarkerX = endClip; updateExportZone(); } playheadX += original.widthPx + 10; document.getElementById('playhead').style.left = playheadX + 'px'; triggerAutosave();
            }
        }

        function updateSelectedOverlaySize() { if (selectedClipEl) { const id = selectedClipEl.getAttribute('data-id'); let clipObj = projectClips.find(c => c.id == id); if (clipObj && (clipObj.type === 'text' || clipObj.type === 'sticker')) { clipObj.size = parseInt(document.getElementById('elementSize').value); triggerAutosave(); } } }

        function deleteSelectedClip() { if(selectedClipEl) { const id = selectedClipEl.getAttribute('data-id'); let clipObj = projectClips.find(c => c.id == id); if (clipObj && clipObj.domElement) clipObj.domElement.remove(); projectClips = projectClips.filter(c => c.id != id); selectedClipEl.remove(); selectedClipEl = null; triggerAutosave(); } }

        // --- ARRASTRE ---
        function makeDraggable(element, isPlayhead = false, clipId = null) {
            let startX = 0, currentLeft = 0; const dragTarget = isPlayhead ? element : element.querySelector('.drag-area');
            function dragStart(e) { if(isPlaying) togglePlayback(); e.preventDefault(); startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; currentLeft = parseInt(element.style.left || 45); document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove, {passive: false}); document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd); }
            function dragMove(e) {
                e.preventDefault(); let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; let newLeft = currentLeft + (x - startX); if(newLeft < 45) newLeft = 45; element.style.left = newLeft + 'px';
                if(isPlayhead) {
                    playheadX = newLeft; globalTime = Math.floor((newLeft - 45) / (pixelsPerSecond/10)); updateTimecode();
                    projectClips.forEach(c => { if((c.type === 'video' || c.type === 'audio') && c.domElement && newLeft >= c.startPx && newLeft <= c.startPx + c.widthPx && !c.isOffline) { let mediaTime = ((newLeft - c.startPx) + c.offsetPx) / pixelsPerSecond; if(mediaTime >= 0) c.domElement.currentTime = mediaTime; } });
                } else if (clipId) { let clipObj = projectClips.find(c => c.id == clipId); if(clipObj) clipObj.startPx = newLeft; }
            }
            function dragEnd(e) { document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove); document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd); if(!isPlayhead) triggerAutosave(); }
            if(dragTarget) { dragTarget.addEventListener('mousedown', dragStart); dragTarget.addEventListener('touchstart', dragStart, {passive: false}); }
        }
        makeDraggable(document.getElementById('playhead'), true);

        function makeResizable(clipUi, clipId) {
            const handle = document.createElement('div'); handle.className = 'resize-handle'; clipUi.appendChild(handle); let isResizing = false; let startX = 0; let startWidth = 0;
            function resizeStart(e) { e.stopPropagation(); isResizing = true; startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; startWidth = parseInt(clipUi.style.width, 10); document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', resizeMove, {passive: false}); document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', resizeEnd); }
            function resizeMove(e) { if (!isResizing) return; e.preventDefault(); let currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; let newWidth = startWidth + (currentX - startX); if (newWidth < 30) newWidth = 30; clipUi.style.width = newWidth + 'px'; let clipObj = projectClips.find(c => c.id == clipId); if (clipObj) clipObj.widthPx = newWidth; }
            function resizeEnd(e) { isResizing = false; document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', resizeMove); document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', resizeEnd); triggerAutosave(); }
            handle.addEventListener('mousedown', resizeStart); handle.addEventListener('touchstart', resizeStart, {passive: false});
        }

        // TÁCTIL EN CANVAS
        function getCanvasPos(e) { const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) }; }
        function handleCanvasStart(e) {
            const pos = getCanvasPos(e); let found = null;
            for (let i = projectClips.length - 1; i >= 0; i--) {
                let o = projectClips[i];
                if ((o.type === 'text' || o.type === 'sticker') && playheadX >= o.startPx && playheadX <= o.startPx + o.widthPx) {
                    if (o.type === 'text') { ctx.font = `bold ${o.size}px ${o.font || 'sans-serif'}`; let w = ctx.measureText(o.content).width; let h = o.size; if (pos.x >= o.x - w/2 - 30 && pos.x <= o.x + w/2 + 30 && pos.y >= o.y - h - 30 && pos.y <= o.y + 30) { found = o; break; } } 
                    else if (o.type === 'sticker') { let w = o.size; let h = o.size * o.ratio; if (pos.x >= o.x - w/2 - 30 && pos.x <= o.x + w/2 + 30 && pos.y >= o.y - h/2 - 30 && pos.y <= o.y + h/2 + 30) { found = o; break; } }
                }
            }
            if (found) { isDraggingOverlay = true; let clipDom = document.querySelector(`.clip-block[data-id="${found.id}"]`); if (clipDom) { clipDom.dispatchEvent(new Event('mousedown')); } document.getElementById('elementSize').value = found.size; e.preventDefault(); }
        }
        function handleCanvasMove(e) { if (!isDraggingOverlay || !selectedClipEl) return; e.preventDefault(); const pos = getCanvasPos(e); const id = selectedClipEl.getAttribute('data-id'); let clipObj = projectClips.find(c => c.id == id); if(clipObj && (clipObj.type === 'text' || clipObj.type === 'sticker')) { clipObj.x = pos.x; clipObj.y = pos.y; } }
        function handleCanvasEnd(e) { if(isDraggingOverlay){ isDraggingOverlay = false; triggerAutosave(); } }
        canvas.addEventListener('mousedown', handleCanvasStart); canvas.addEventListener('touchstart', handleCanvasStart, {passive: false}); canvas.addEventListener('mousemove', handleCanvasMove);  canvas.addEventListener('touchmove', handleCanvasMove, {passive: false}); window.addEventListener('mouseup', handleCanvasEnd); window.addEventListener('touchend', handleCanvasEnd);

        // --- RENDERIZADO ---
        function renderLoop() {
            ctx.fillStyle = "#111115"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            let activeVisualClip = null;
            for (let i = projectClips.length - 1; i >= 0; i--) { const clip = projectClips[i]; if ((clip.type === 'video' || clip.type === 'image') && playheadX >= clip.startPx && playheadX <= clip.startPx + clip.widthPx && !clip.isOffline) { activeVisualClip = clip; break; } }

            projectClips.forEach(clip => {
                if (clip.domElement && (clip.type === 'video' || clip.type === 'audio') && !clip.isOffline) {
                    let isUnderPlayhead = (playheadX >= clip.startPx && playheadX <= clip.startPx + clip.widthPx);
                    if (isUnderPlayhead && isPlaying) { if (clip.domElement.paused) clip.domElement.play().catch(e => {}); } 
                    else { if (!clip.domElement.paused) clip.domElement.pause(); }
                }
            });

            if (activeVisualClip && activeVisualClip.domElement) {
                if(activeVisualClip.type === 'video' && activeVisualClip.domElement.readyState >= 2) { ctx.drawImage(activeVisualClip.domElement, 0, 0, canvas.width, canvas.height); } 
                else if (activeVisualClip.type === 'image') { ctx.drawImage(activeVisualClip.domElement, 0, 0, canvas.width, canvas.height); }
            } else {
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center"; ctx.fillText("Área de Lienzo", canvas.width/2, canvas.height/2);
            }
            
            projectClips.forEach(o => {
                if ((o.type === 'text' || o.type === 'sticker') && playheadX >= o.startPx && playheadX <= o.startPx + o.widthPx && !o.isOffline) {
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    if (o.type === 'text') {
                        ctx.font = `bold ${o.size}px ${o.font || 'sans-serif'}`; let w = ctx.measureText(o.content).width; let h = o.size;
                        if(o.useBg) { ctx.fillStyle = o.bgColor || '#000000'; ctx.fillRect(o.x - w/2 - 15, o.y - h/2 - 10, w + 30, h + 20); }
                        ctx.strokeStyle = '#000000'; ctx.lineWidth = o.size / 10; ctx.strokeText(o.content, o.x, o.y); ctx.fillStyle = o.color; ctx.fillText(o.content, o.x, o.y);
                    } else if (o.type === 'sticker') { let w = o.size; let h = o.size * o.ratio; ctx.drawImage(o.imgObj, o.x - w/2, o.y - h/2, w, h); }
                    if (selectedClipEl && selectedClipEl.getAttribute('data-id') == o.id && !isExporting) {
                        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.setLineDash([10, 10]);
                        if (o.type === 'text') { let w = ctx.measureText(o.content).width; let h = o.size; ctx.strokeRect(o.x - w/2 - 15, o.y - h/2 - 15, w + 30, h + 30); } 
                        else if (o.type === 'sticker') { let w = o.size; let h = o.size * o.ratio; ctx.strokeRect(o.x - w/2 - 5, o.y - h/2 - 5, w + 10, h + 10); } ctx.setLineDash([]);
                    }
                }
            });
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // --- SISTEMA DE TIEMPOS Y EXPORTACIÓN ---
        let globalTime = 0; let isPlaying = false; let playInterval; let playheadX = 45; const pixelsPerSecond = 20; 
        function updateTimecode() { let secs = Math.floor(globalTime / 10); let decs = globalTime % 10; document.getElementById('timecode').innerText = `00:${secs.toString().padStart(2,'0')}.${decs}`; }
        function togglePlayback() {
            initAudio(); const btn = document.getElementById('btnPlay');
            if (isPlaying) { clearInterval(playInterval); isPlaying = false; btn.classList.remove('fa-pause', 'active-play'); btn.classList.add('fa-play'); } 
            else {
                isPlaying = true; btn.classList.remove('fa-play'); btn.classList.add('fa-pause', 'active-play');
                playInterval = setInterval(() => {
                    globalTime++; playheadX = 45 + (globalTime * (pixelsPerSecond/10)); document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode(); document.getElementById('timelineScroll').scrollLeft = playheadX - 100;
                    if(isExporting && playheadX >= outMarkerX) { mainRecorder.stop(); togglePlayback(); }
                }, 100);
            }
        }
        function resetPlayhead() { 
            playheadX = inMarkerX; document.getElementById('playhead').style.left = playheadX + 'px'; globalTime = Math.floor((playheadX - 45) / (pixelsPerSecond/10)); updateTimecode(); document.getElementById('timelineScroll').scrollLeft = playheadX - 100; 
            projectClips.forEach(clip => { if((clip.type === 'video' || clip.type === 'audio') && clip.domElement && !clip.isOffline) { let mediaTime = ((playheadX - clip.startPx) + clip.offsetPx) / pixelsPerSecond; if(mediaTime >= 0) clip.domElement.currentTime = mediaTime; } });
        }
        
        let mainRecorder; let exportChunks = [];
        function exportVideo() {
            initAudio(); if(projectClips.length === 0) return alert("Agrega medios antes de exportar."); if(selectedClipEl) selectedClipEl.classList.remove('selected'); selectedClipEl = null; if(exportChunks.length > 0) exportChunks = [];
            const finalStream = canvas.captureStream(30); if (audioMixer && audioMixer.stream.getAudioTracks().length > 0) finalStream.addTrack(audioMixer.stream.getAudioTracks()[0]);
            try { mainRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm;codecs=vp9,opus' }); } catch (e) { mainRecorder = new MediaRecorder(finalStream); }
            mainRecorder.ondataavailable = e => { if (e.data.size > 0) exportChunks.push(e.data); };
            mainRecorder.onstop = () => {
                isExporting = false; const blob = new Blob(exportChunks, { type: 'video/webm' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = `Produccion_${Date.now()}.webm`; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
                document.getElementById('recBadge').style.display = 'none'; document.getElementById('btnExport').innerHTML = '<i class="fa-solid fa-rocket"></i> EXPORTAR ZONA'; alert("¡Exportación completada!");
            };
            
            resetPlayhead(); isExporting = true; document.getElementById('recBadge').innerHTML = "EXPORTANDO ZONA..."; document.getElementById('recBadge').style.display = 'block'; document.getElementById('btnExport').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...';
            mainRecorder.start(); togglePlayback(); 
        }

        function switchTab(tabId) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tabId).classList.add('active'); event.currentTarget.classList.add('active'); }
        window.onload = loadProjectList;
    </script>
