<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitium Master Studio - Audio Fix Pro</title>
    
    <!-- Iconos y Estilos Premium -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon: #a855f7;
            --neon-pink: #ec4899;
            --bg: #050506;
            --panel: #0b0b0d;
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: white; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            user-select: none;
        }

        .app-header {
            background: var(--panel); padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }
        .logo { font-size: 16px; font-weight: 900; background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        
        .workspace { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 220px); }

        .control-sidebar {
            width: 340px; background: var(--panel); border-right: 1px solid var(--glass-border);
            padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a1a1aa; font-weight: 700; margin-top: 5px; border-left: 2px solid var(--neon); padding-left: 6px;}

        .tool-group {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px;
        }

        label { font-size: 12px; color: #a1a1aa; display: flex; justify-content: space-between; align-items: center; }
        input[type="range"] { width: 100%; accent-color: var(--neon); background: #222; border-radius: 4px; height: 4px; appearance: none; }
        input[type="text"], select { background: #111113; border: 1px solid var(--glass-border); color: white; padding: 8px; border-radius: 6px; outline: none; font-size: 13px; }
        
        .btn-action { background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: 0.2s; font-size: 12px; }
        .btn-action:hover { background: rgba(255,255,255,0.08); border-color: #555; }
        .btn-action.primary { background: linear-gradient(90deg, var(--neon), var(--neon-pink)); border: none; font-weight: 600; }
        .btn-action.rec-active { background: #ef4444; border-color: #f87171; animation: pulse 1.5s infinite; }

        .preview-area { flex: 1; background: #010102; display: flex; align-items: center; justify-content: center; padding: 15px; position: relative; }
        .canvas-container { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.05); }
        canvas { display: block; max-width: 100%; max-height: 55vh; background: #000; }

        .timeline-section { background: var(--panel); border-top: 1px solid var(--glass-border); padding: 12px 20px; display: flex; flex-direction: column; gap: 10px; }
        .timeline-header { display: flex; align-items: center; justify-content: space-between; }
        .btn-group { display: flex; gap: 6px; }

        .timeline-container { position: relative; background: #111113; border-radius: 6px; height: 50px; border: 1px solid var(--glass-border); overflow: hidden; }
        .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: rgba(168, 85, 247, 0.12); border-right: 2px solid var(--neon); pointer-events: none; z-index: 4; }
        .track-layer { position: absolute; top: 4px; bottom: 4px; background: linear-gradient(90deg, #1f1f23, #2d2d33); border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; color: #ccc; z-index: 2; border: 1px solid rgba(255,255,255,0.03); }

        #hiddenVideo, #hiddenCam, #bgImageHidden { display: none; }
        .status-overlay { position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: bold; display: none; z-index: 6; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>

    <!-- Header superior con Control de Grabación -->
    <div class="app-header">
        <div class="logo"><i class="fa-solid fa-microphone-lines"></i> CAPACITIUM MASTER STUDIO (PRO AUDIO)</div>
        <div class="btn-group">
            <button class="btn-action" onclick="undo()"><i class="fa-solid fa-rotate-left"></i> Deshacer</button>
            <button class="btn-action" onclick="redo()"><i class="fa-solid fa-rotate-right"></i> Rehacer</button>
            <button class="btn-action primary" id="btnStartRec" onclick="startManualRecord()"><i class="fa-solid fa-circle"></i> Iniciar Grabar</button>
            <button class="btn-action" id="btnStopRec" onclick="stopManualRecord()" disabled><i class="fa-solid fa-square"></i> Detener</button>
            <button class="btn-action" id="btnDownloadRec" onclick="downloadManualRecord()" style="background: #22c55e; border: none; display: none;"><i class="fa-solid fa-save"></i> Guardar Video</button>
        </div>
    </div>

    <div class="workspace">
        <div class="control-sidebar">
            
            <div class="panel-title">1. Entrada de Medios</div>
            <div class="tool-group">
                <button class="btn-action primary" onclick="document.getElementById('videoUpload').click()"><i class="fa-solid fa-file-video"></i> Importar Video Base</button>
                <input type="file" id="videoUpload" accept="video/*" style="display: none;" onchange="loadVideo(event)">
                
                <button class="btn-action" id="btnCam" onclick="toggleCamera()"><i class="fa-solid fa-camera"></i> Activar Mi Cámara e Iniciar Audio</button>
            </div>

            <div class="panel-title">2. Set Virtual</div>
            <div class="tool-group">
                <label>Fondo de Pantalla Virtual</label>
                <select id="bgScenario" onchange="changeScenario()">
                    <option value="none">Sin fondo (Cámara Normal)</option>
                    <option value="neon">Estudio Cyber Neon (Morado)</option>
                    <option value="dark">Set Corporativo Elegante (Negro/Gris)</option>
                    <option value="wood">Estudio de Radio/Podcast (Madera)</option>
                </select>
                <label>Tolerancia Croma</label>
                <input type="range" id="chromaKeyTolerance" min="10" max="150" value="70" oninput="updateEditor()">
            </div>

            <div class="panel-title">3. Banda Sonora Instrumental (10 Canales Reales)</div>
            <div class="tool-group">
                <label>Selecciona Track</label>
                <select id="bgMusicSelect" onchange="changeMusic()">
                    <option value="none">Sin música de fondo</option>
                    <option value="t1">1. Tecno / Electronic Cyber (High Energy)</option>
                    <option value="t2">2. Synthwave Retro Instrumental (80s Drive)</option>
                    <option value="t3">3. Lo-Fi Hip Hop Chillout (Relaxed Study)</option>
                    <option value="t4">4. Deep House Club Mix (Corporate Modern)</option>
                    <option value="t5">5. Cinematic Mystery / Drama (Profundo)</option>
                    <option value="t6">6. Epic Corporate Presentation (Éxito)</option>
                    <option value="t7">7. Chillstep Melódico (Atmosférico)</option>
                    <option value="t8">8. Upbeat Acoustic Guitar (Alegre)</option>
                    <option value="t9">9. Minimal Techno Beats (Bajo Continuo)</option>
                    <option value="t10">10. Ambient Meditation Pad (Relajación)</option>
                </select>
                <label>Volumen Música <span id="valVol">20%</span></label>
                <input type="range" id="bgMusicVolume" min="0" max="100" value="20" oninput="document.getElementById('valVol').innerText=this.value+'%'; changeVolume();">
            </div>

            <div class="panel-title">4. Títulos Dinámicos</div>
            <div class="tool-group">
                <input type="text" id="editorText" value="Arrástrame en el cuadro" oninput="saveState(); updateEditor();">
                <label>Tamaño Fuente</label>
                <input type="range" id="textSize" min="16" max="70" value="30" oninput="updateEditor()">
                <input type="color" id="textColor" value="#ffffff" onchange="updateEditor()" style="width:100%; height:30px; border:none; cursor:pointer;">
            </div>
        </div>

        <div class="preview-area">
            <div class="status-overlay" id="statusOverlay">🔴 GRABANDO VIDEO Y MÚSICA EN VIVO...</div>
            <div class="canvas-container" id="canvasContainer" style="cursor: move;">
                <canvas id="videoCanvas"></canvas>
            </div>
            
            <!-- ELIMINADO EL ATRIBUTO MUTED PARA QUE EL NAVEGADOR REPRODUZCA SONIDO -->
            <video id="hiddenVideo" loop playsinline crossorigin="anonymous"></video>
            <video id="hiddenCam" autoplay playsinline></video>
            <img id="bgImageHidden" crossorigin="anonymous" src="">
            <audio id="bgAudioElement" loop crossorigin="anonymous"></audio>
        </div>
    </div>

    <div class="timeline-section">
        <div class="timeline-header">
            <div class="btn-group">
                <button class="btn-action" id="btnPlayPause" onclick="togglePlay()"><i class="fa-solid fa-play"></i> Play</button>
                <button class="btn-action danger" onclick="splitVideo()"><i class="fa-solid fa-scissors"></i> Cortar</button>
                <button class="btn-action danger" onclick="deleteSegment()"><i class="fa-solid fa-trash"></i> Borrar</button>
            </div>
            <div style="font-size: 13px; color: #a1a1aa; font-family: monospace;" id="timeCode">00:00 / 00:00</div>
        </div>

        <div class="timeline-container" id="timelineWrapper">
            <div class="timeline-progress" id="timeProgress"></div>
            <div class="track-layer" id="trackVisual" style="left: 0%; width: 100%; display: none;">
                <i class="fa-solid fa-video" style="margin-right:6px;"></i> <span id="fileName">Clip Base</span>
            </div>
        </div>
    </div>

    <!-- NÚCLEO INGENIERÍA DE AUDIO MEZCLADO (MULTIPREMIUM MASTER) -->
    <script>
        let audioCtx = null;
        let mixerDest = null;
        let videoNode = null;
        let micNode = null;
        let musicNode = null;
        let musicGainNode = null;

        const audioEl = document.getElementById('bgAudioElement');
        const videoEl = document.getElementById('hiddenVideo');

        const musicTracks = {
            t1: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
            t2: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            t3: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            t4: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            t5: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
            t6: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
            t7: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3",
            t8: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
            t9: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3",
            t10: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3"
        };

        // Inicializa el hardware de audio unificado al primer clic del usuario (Regla estricta de Chrome/Edge)
        function initAudioMixer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mixerDest = audioCtx.createMediaStreamDestination();

                // 1. Enrutar el Audio del Video Base al Mezclador General
                videoNode = audioCtx.createMediaElementSource(videoEl);
                videoNode.connect(audioCtx.destination); // Para que se escuche en las bocinas
                videoNode.connect(mixerDest);            // Para mandar el sonido a la grabación

                // 2. Enrutar la Música de Fondo al Mezclador General
                musicNode = audioCtx.createMediaElementSource(audioEl);
                musicGainNode = audioCtx.createGain();
                musicGainNode.gain.value = document.getElementById('bgMusicVolume').value / 100;
                
                musicNode.connect(musicGainNode);
                musicGainNode.connect(audioCtx.destination); // Bocinas
                musicGainNode.connect(mixerDest);            // Grabación
            }
        }

        function changeMusic() {
            initAudioMixer();
            const selected = document.getElementById('bgMusicSelect').value;
            if (selected === 'none') {
                audioEl.pause();
                audioEl.src = "";
            } else {
                audioEl.src = musicTracks[selected];
                audioEl.play().catch(e => console.log("Se requiere reproducir video primero"));
            }
        }

        function changeVolume() {
            if (musicGainNode) {
                musicGainNode.gain.value = document.getElementById('bgMusicVolume').value / 100;
            }
            audioEl.volume = document.getElementById('bgMusicVolume').value / 100;
        }
    </script>

    <!-- Motor Gráfico e Interfaz de Video -->
    <script>
        const camera = document.getElementById('hiddenCam');
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const bgImg = document.getElementById('bgImageHidden');
        
        let animationFrameId;
        let textX = 400, textY = 240, isDragging = false;
        let isCamActive = false;

        let mediaRecorderInstance = null;
        let recordedChunks = [];

        let historyStack = [];
        let undoStack = [];

        canvas.width = 854; canvas.height = 480;
        ctx.fillStyle = "#111113"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#a855f7"; ctx.font = "bold 16px Inter"; ctx.textAlign = "center";
        ctx.fillText("AUDIO TRACKS & MICROPHONE RECONECTADO", canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = "#71717a"; ctx.font = "13px Inter";
        ctx.fillText("Importa un video o activa la cámara. Todo el audio está enrutado al master final.", canvas.width/2, canvas.height/2 + 10);

        function saveState() {
            const state = {
                text: document.getElementById('editorText').value,
                textX: textX, textY: textY,
                textSize: document.getElementById('textSize').value,
                textColor: document.getElementById('textColor').value,
                currentTime: videoEl.currentTime
            };
            historyStack.push(JSON.stringify(state));
            undoStack = [];
        }

        function undo() {
            if (historyStack.length > 1) {
                undoStack.push(historyStack.pop());
                applyState(JSON.parse(historyStack[historyStack.length - 1]));
            }
        }

        function redo() {
            if (undoStack.length > 0) {
                const stateStr = undoStack.pop();
                historyStack.push(stateStr);
                applyState(JSON.parse(stateStr));
            }
        }

        function applyState(state) {
            document.getElementById('editorText').value = state.text;
            textX = state.textX; textY = state.textY;
            document.getElementById('textSize').value = state.textSize;
            document.getElementById('textColor').value = state.textColor;
            videoEl.currentTime = state.currentTime;
            updateEditor();
        }

        function loadVideo(event) {
            const file = event.target.files[0];
            if (file) {
                videoEl.src = URL.createObjectURL(file);
                videoEl.load();
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('trackVisual').style.display = 'flex';
                videoEl.onloadedmetadata = () => {
                    canvas.width = videoEl.videoWidth; canvas.height = videoEl.videoHeight;
                    saveState();
                    updateEditor();
                };
            }
        }

        function toggleCamera() {
            initAudioMixer(); // Activar mezclador en la primera interacción
            if (!isCamActive) {
                navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: true })
                .then(stream => {
                    camera.srcObject = stream;
                    isCamActive = true;
                    document.getElementById('btnCam').classList.add('primary');
                    document.getElementById('btnCam').innerHTML = "🔴 Apagar Cámara";

                    // 3. Conectar el micrófono capturado al hardware del mezclador maestro
                    micNode = audioCtx.createMediaStreamSource(stream);
                    micNode.connect(mixerDest); // Lo manda directo a la pista del archivo final de video
                    
                    renderLoop();
                }).catch(err => alert("Por favor, concede permisos para acceder a tu cámara y micrófono."));
            } else {
                let stream = camera.srcObject;
                if (stream) stream.getTracks().forEach(track => track.stop());
                isCamActive = false;
                document.getElementById('btnCam').classList.remove('primary');
                document.getElementById('btnCam').innerHTML = "Activar Mi Cámara e Iniciar Audio";
            }
        }

        function changeScenario() {
            const select = document.getElementById('bgScenario').value;
            if (select === 'neon') {
                bgImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='854' height='480'><rect width='100%' height='100%' fill='%23120626'/><circle cx='200' cy='150' r='300' fill='%233b0764' opacity='0.5'/><circle cx='700' cy='350' r='200' fill='%23db2777' opacity='0.2'/></svg>";
            } else if (select === 'dark') {
                bgImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='854' height='480'><rect width='100%' height='100%' fill='%2318181b'/></svg>";
            } else if (select === 'wood') {
                bgImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='854' height='480'><rect width='100%' height='100%' fill='%23451a03'/></svg>";
            } else {
                bgImg.src = "";
            }
            updateEditor();
        }

        function togglePlay() {
            initAudioMixer(); // Seguridad de inicio de audio
            if (videoEl.src) {
                if (videoEl.paused) { 
                    videoEl.play(); 
                    if(audioEl.src) audioEl.play();
                    document.getElementById('btnPlayPause').innerHTML = '<i class="fa-solid fa-pause"></i> Pause';
                    renderLoop(); 
                } 
                else { 
                    videoEl.pause(); 
                    audioEl.pause();
                    document.getElementById('btnPlayPause').innerHTML = '<i class="fa-solid fa-play"></i> Play';
                    cancelAnimationFrame(animationFrameId); 
                }
            }
        }

        function renderLoop() {
            updateEditor();
            if (!videoEl.paused || isCamActive || mediaRecorderInstance) {
                animationFrameId = requestAnimationFrame(renderLoop);
            }
        }

        function updateEditor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (document.getElementById('bgScenario').value !== 'none' && bgImg.src) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            }

            if (videoEl.src && videoEl.readyState >= 2) {
                ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
            }

            if (isCamActive && camera.readyState >= 2) {
                if (document.getElementById('bgScenario').value !== 'none') {
                    let tempCanvas = document.createElement('canvas');
                    tempCanvas.width = 320; tempCanvas.height = 240;
                    let tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(camera, 0, 0, 320, 240);
                    
                    let frame = tempCtx.getImageData(0, 0, 320, 240);
                    let l = frame.data.length / 4;

                    for (let i = 0; i < l; i++) {
                        let r = frame.data[i * 4 + 0];
                        let g = frame.data[i * 4 + 1];
                        let b = frame.data[i * 4 + 2];
                        if (g > 100 && g > r && g > b || (r > 160 && g > 160 && b > 160)) {
                            frame.data[i * 4 + 3] = 0;
                        }
                    }
                    tempCtx.putImageData(frame, 0, 0);
                    ctx.drawImage(tempCanvas, canvas.width - 250, canvas.height - 200, 230, 180);
                } else {
                    ctx.strokeStyle = "var(--neon)"; ctx.lineWidth = 2;
                    ctx.strokeRect(canvas.width - 252, canvas.height - 202, 234, 184);
                    ctx.drawImage(camera, canvas.width - 250, canvas.height - 200, 230, 180);
                }
            }

            const text = document.getElementById('editorText').value;
            if (text) {
                const fontSize = document.getElementById('textSize').value;
                ctx.font = `bold ${fontSize}px system-ui`;
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 5;
                ctx.strokeText(text, textX, textY);
                ctx.fillStyle = document.getElementById('textColor').value;
                ctx.fillText(text, textX, textY);
            }

            if (videoEl.duration) {
                document.getElementById('timeCode').innerText = `${formatTime(videoEl.currentTime)} / ${formatTime(videoEl.duration)}`;
                document.getElementById('timeProgress').style.width = (videoEl.currentTime / videoEl.duration * 100) + '%';
            }
        }

        function formatTime(s) {
            return Math.floor(s / 60).toString().padStart(2, '0') + ':' + Math.floor(s % 60).toString().padStart(2, '0');
        }

        function splitVideo() { if (videoEl.src) alert("✂️ Segmento marcado."); }
        function deleteSegment() { if (videoEl.src) alert("🗑️ Cambios limpiados."); }

        // SISTEMA MANUAL DE GRABACIÓN REVISADO CON COMBINACIÓN DE AUDIO DE HARDWARE
        function startManualRecord() {
            initAudioMixer();
            recordedChunks = [];
            
            // 1. Obtener la pista visual pura del Canvas de video
            const finalStream = canvas.captureStream(30);
            
            // 2. Extraer la pista de audio unificada y mezclada de nuestro hardware MixerDest
            if (mixerDest && mixerDest.stream.getAudioTracks().length > 0) {
                finalStream.addTrack(mixerDest.stream.getAudioTracks()[0]);
            }

            try {
                mediaRecorderInstance = new MediaRecorder(finalStream, { mimeType: 'video/webm;codecs=vp9,opus' });
            } catch (e) {
                mediaRecorderInstance = new MediaRecorder(finalStream);
            }

            mediaRecorderInstance.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorderInstance.onstop = () => {
                document.getElementById('statusOverlay').style.display = 'none';
                document.getElementById('btnDownloadRec').style.display = 'inline-flex';
            };

            document.getElementById('btnStartRec').classList.add('rec-active');
            document.getElementById('btnStartRec').innerHTML = "🔴 Grabando...";
            document.getElementById('btnStartRec').disabled = true;
            document.getElementById('btnStopRec').disabled = false;
            document.getElementById('statusOverlay').style.display = 'block';

            mediaRecorderInstance.start(10); 
            if (videoEl.src && videoEl.paused) togglePlay();
        }

        function stopManualRecord() {
            if (mediaRecorderInstance && mediaRecorderInstance.state !== "inactive") {
                mediaRecorderInstance.stop();
            }
            document.getElementById('btnStartRec').classList.remove('rec-active');
            document.getElementById('btnStartRec').innerHTML = "<i class='fa-solid fa-circle'></i> Iniciar Grabar";
            document.getElementById('btnStartRec').disabled = false;
            document.getElementById('btnStopRec').disabled = true;
            
            if (videoEl.src && !videoEl.paused) togglePlay();
        }

        function downloadManualRecord() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Capacitium_Studio_Production_${Date.now()}.webm`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            document.getElementById('btnDownloadRec').style.display = 'none';
            alert("¡Video guardado perfectamente con todas tus pistas de sonido unificadas!");
        }

        // DRAG & DROP
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }
        document.getElementById('canvasContainer').addEventListener('mousedown', (e) => {
            const pos = getPos(e);
            if (Math.sqrt(Math.pow(pos.x - textX, 2) + Math.pow(pos.y - textY, 2)) < 120) isDragging = true;
        });
        window.addEventListener('mousemove', (e) => { if (isDragging) { const pos = getPos(e); textX = pos.x; textY = pos.y; updateEditor(); } });
        window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; saveState(); } });
    </script>
</body>
</html>
