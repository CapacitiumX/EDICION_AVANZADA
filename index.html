<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapacitiumX Pro Editor v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #3b82f6; --bg: #09090b; --panel: #18181b; --track-bg: #27272a; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; user-select: none; }

        .app-header { background: var(--panel); padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-weight: 600; font-size: 14px; align-items: center; }
        .btn-save { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; }
        
        .preview-area { background: #000; display: flex; justify-content: center; padding: 10px; height: 30vh; border-bottom: 1px solid #333; position: relative; }
        canvas { max-width: 100%; max-height: 100%; border-radius: 8px; background: #111; object-fit: contain; }
        .status-rec { position: absolute; top: 15px; right: 20px; background: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: none; animation: pulse 1.5s infinite; }

        /* TOOLBAR Y REPRODUCTOR */
        .timeline-editor { background: var(--panel); display: flex; flex-direction: column; height: 30vh; border-bottom: 1px solid #333; }
        .timeline-toolbar { display: flex; gap: 15px; padding: 10px 12px; background: #000; font-size: 14px; align-items: center; }
        .action-btn { cursor: pointer; color: #a1a1aa; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: white; }
        .action-btn.active-play { color: #10b981; }

        /* PISTAS */
        .tracks-container { flex: 1; padding: 10px 0; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .track { height: 45px; background: var(--track-bg); display: flex; position: relative; min-width: 300vw; border-bottom: 1px solid #333; }
        .track-label { position: sticky; left: 0; background: #111; width: 30px; display: flex; justify-content: center; align-items: center; font-size: 12px; z-index: 30; border-right: 1px solid #555; }
        
        /* CABEZAL DE REPRODUCCIÓN (LÍNEA ROJA ARRASTRABLE) */
        .playhead-container { position: absolute; top: 0; bottom: 0; left: 30px; width: 20px; z-index: 40; transform: translateX(-10px); cursor: ew-resize; }
        .playhead-line { position: absolute; left: 10px; width: 2px; height: 100%; background: #ef4444; pointer-events: none; }
        .playhead-head { position: absolute; left: 5px; top: 0; width: 12px; height: 12px; background: #ef4444; clip-path: polygon(0 0, 100% 0, 50% 100%); pointer-events: none; }

        /* CLIPS ARRASTRABLES */
        .clip-block { position: absolute; height: 90%; top: 5%; background: #3b82f6; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: bold; cursor: grab; opacity: 0.9; overflow: hidden; white-space: nowrap; border: 1px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 20; }
        .clip-block.audio { background: #10b981; border-color: #34d399; }
        .clip-block.selected { border: 2px solid white; opacity: 1; z-index: 25; }
        .clip-block:active { cursor: grabbing; }

        /* PANELES INFERIORES */
        .control-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .tab-menu { display: flex; background: var(--panel); overflow-x: auto; border-bottom: 1px solid #333; }
        .tab-btn { padding: 12px 16px; font-size: 12px; color: #a1a1aa; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--neon); }
        .tab-content { flex: 1; padding: 15px; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .btn { background: #27272a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; font-size: 12px; text-align: center; cursor: pointer; font-weight: bold; }
        .btn.primary { background: var(--neon); border: none; }
        .btn.danger { background: #ef4444; border: none; }
        select { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; font-size: 12px; width: 100%; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header">
        <span><i class="fa-solid fa-film"></i> Estudio Pro</span>
        <button class="btn-save" onclick="exportVideo()"><i class="fa-solid fa-download"></i> GUARDAR</button>
    </div>

    <div class="preview-area">
        <div class="status-rec" id="recBadge">REC</div>
        <canvas id="mainCanvas"></canvas>
        <video id="hiddenCam" autoplay playsinline style="display:none;"></video>
        <video id="hiddenVideo" playsinline style="display:none;"></video>
    </div>

    <div class="timeline-editor">
        <div class="timeline-toolbar">
            <i class="fa-solid fa-play action-btn" id="btnPlay" onclick="togglePlayback()" title="Reproducir"></i>
            <i class="fa-solid fa-backward action-btn" onclick="resetPlayhead()" title="Al inicio"></i>
            <div style="width: 1px; height: 15px; background: #555; margin: 0 10px;"></div>
            <i class="fa-solid fa-trash action-btn" onclick="deleteSelectedClip()" title="Borrar Seleccionado"></i>
            <span id="timecode" style="margin-left: auto; font-family: monospace; color: #10b981;">00:00.0</span>
        </div>
        
        <div class="tracks-container" id="timelineScroll">
            <div class="playhead-container" id="playhead">
                <div class="playhead-head"></div>
                <div class="playhead-line"></div>
            </div>
            
            <div class="track" id="videoTrack">
                <div class="track-label"><i class="fa-solid fa-video"></i></div>
            </div>
            <div class="track" id="audioTrack">
                <div class="track-label"><i class="fa-solid fa-microphone"></i></div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="tab-menu">
            <div class="tab-btn active" onclick="switchTab('media')"><i class="fa-solid fa-folder-open"></i> Medios</div>
            <div class="tab-btn" onclick="switchTab('camera')"><i class="fa-solid fa-camera"></i> Cámara y Fondo</div>
        </div>

        <div id="media" class="tab-content active">
            <div class="btn primary" onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-plus"></i> Añadir Foto / Video</div>
            <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none;" onchange="addMediaToTimeline(event)">
            <p style="font-size: 11px; color: #888;">Toca un clip y arrástralo para moverlo. Arrastra la línea roja para cambiar el tiempo.</p>
        </div>

        <div id="camera" class="tab-content">
            <label style="font-size: 11px; color: #aaa;">Modo de Cámara</label>
            <select id="camMode" onchange="updateCamSettings()">
                <option value="none">Apagada</option>
                <option value="pip">Miniatura (Esquina Inferior)</option>
                <option value="full">Pantalla Completa</option>
            </select>
            
            <label style="font-size: 11px; color: #aaa; margin-top: 10px;">Fondo Virtual (Chroma Key)</label>
            <select id="camBg" onchange="updateCamSettings()">
                <option value="transparent">Sin Fondo (Mostrar Medios atrás)</option>
                <option value="neon">Estudio Neon</option>
                <option value="dark">Set Premium</option>
            </select>

            <div class="btn primary" id="btnToggleCam" onclick="toggleCamera()" style="margin-top: 10px;"><i class="fa-solid fa-video"></i> Activar Cámara / Micrófono</div>
        </div>
    </div>

    <script>
        // --- MOTOR GRÁFICO (CANVAS) ---
        const canvas = document.getElementById('mainCanvas'); 
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;
        
        const hiddenCam = document.getElementById('hiddenCam');
        const hiddenVideo = document.getElementById('hiddenVideo');
        
        let currentImage = null;
        let isCamActive = false;
        let renderFrameId;

        function renderLoop() {
            ctx.fillStyle = "#18181b"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar Fondo de Medios (Imagen o Video)
            if (hiddenVideo.src && !hiddenVideo.paused) {
                ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
            } else if (currentImage) {
                ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "white"; ctx.font = "24px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("Lienzo de CapacitiumX", canvas.width/2, canvas.height/2);
            }

            // 2. Dibujar Cámara con Fondo Virtual
            if (isCamActive && hiddenCam.readyState >= 2) {
                const mode = document.getElementById('camMode').value;
                const bg = document.getElementById('camBg').value;
                
                let camW = mode === 'full' ? canvas.width : 320;
                let camH = mode === 'full' ? canvas.height : 240;
                let camX = mode === 'full' ? 0 : canvas.width - camW - 20;
                let camY = mode === 'full' ? 0 : canvas.height - camH - 20;

                // Si hay fondo virtual seleccionado, dibujar fondo antes de la cámara
                if(mode === 'full') {
                    if (bg === 'neon') {
                        let grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width);
                        grd.addColorStop(0, '#16092b'); grd.addColorStop(1, '#020007');
                        ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    } else if (bg === 'dark') {
                        ctx.fillStyle = '#141416'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                }

                ctx.drawImage(hiddenCam, camX, camY, camW, camH);
            }

            renderFrameId = requestAnimationFrame(renderLoop);
        }
        renderLoop(); // Iniciar motor gráfico

        // --- SISTEMA NLE (LÍNEA DE TIEMPO Y ARRASTRE) ---
        let selectedClipEl = null;
        let globalTime = 0; // en décimas de segundo (10 = 1 seg)
        let isPlaying = false;
        let playInterval;
        let playheadX = 30; // Posición X en pixeles
        const pixelsPerSecond = 20; 

        function updateTimecode() { 
            let secs = Math.floor(globalTime / 10);
            let decs = globalTime % 10;
            document.getElementById('timecode').innerText = `00:${secs.toString().padStart(2,'0')}.${decs}`; 
        }

        function togglePlayback() {
            const btn = document.getElementById('btnPlay');
            if(isPlaying) {
                clearInterval(playInterval); isPlaying = false;
                btn.classList.remove('fa-pause', 'active-play'); btn.classList.add('fa-play');
                if(hiddenVideo.src) hiddenVideo.pause();
            } else {
                isPlaying = true;
                btn.classList.remove('fa-play'); btn.classList.add('fa-pause', 'active-play');
                if(hiddenVideo.src) hiddenVideo.play();
                
                playInterval = setInterval(() => {
                    globalTime++; 
                    playheadX = 30 + (globalTime * (pixelsPerSecond/10));
                    document.getElementById('playhead').style.left = playheadX + 'px';
                    updateTimecode();
                    document.getElementById('timelineScroll').scrollLeft = playheadX - 100;
                }, 100);
            }
        }

        function resetPlayhead() { 
            globalTime = 0; playheadX = 30; 
            document.getElementById('playhead').style.left = '30px'; 
            updateTimecode(); document.getElementById('timelineScroll').scrollLeft = 0; 
            if(hiddenVideo.src) hiddenVideo.currentTime = 0;
        }

        function selectClip(e) {
            if(selectedClipEl) selectedClipEl.classList.remove('selected');
            selectedClipEl = e.currentTarget;
            selectedClipEl.classList.add('selected');
        }

        function deleteSelectedClip() {
            if(selectedClipEl) { 
                selectedClipEl.remove(); selectedClipEl = null; 
                currentImage = null; hiddenVideo.src = ""; // Limpiar visuales
            }
        }

        function addMediaToTimeline(event) {
            const file = event.target.files[0]; if (!file) return;
            const isVideo = file.type.startsWith('video/');
            const url = URL.createObjectURL(file);
            
            const clip = document.createElement('div');
            clip.className = 'clip-block'; clip.style.left = playheadX + 'px'; clip.style.width = '150px';
            clip.innerHTML = `<i class="fa-solid fa-${isVideo ? 'film' : 'image'}"></i> &nbsp;${file.name.substring(0,10)}`;
            
            // Eventos para arrastrar el clip
            makeDraggable(clip);
            clip.addEventListener('mousedown', selectClip);
            clip.addEventListener('touchstart', selectClip, {passive: true});

            document.getElementById('videoTrack').appendChild(clip);

            // Cargar en el lienzo
            if(isVideo) {
                hiddenVideo.src = url; hiddenVideo.load();
                currentImage = null;
            } else {
                currentImage = new Image(); currentImage.src = url;
                hiddenVideo.src = "";
            }
        }

        // --- LÓGICA DE ARRASTRE UNIVERSAL (CLIPS Y LÍNEA ROJA) ---
        function makeDraggable(element, isPlayhead = false) {
            let startX = 0, currentLeft = 0;

            function dragStart(e) {
                if(isPlaying) togglePlayback(); // Pausar al arrastrar
                e.preventDefault();
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                currentLeft = parseInt(element.style.left || 30);
                
                document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove, {passive: false});
                document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd);
            }

            function dragMove(e) {
                e.preventDefault();
                let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let delta = x - startX;
                let newLeft = currentLeft + delta;
                
                if(newLeft < 30) newLeft = 30; // Limite izquierdo
                element.style.left = newLeft + 'px';

                if(isPlayhead) {
                    playheadX = newLeft;
                    globalTime = Math.floor((newLeft - 30) / (pixelsPerSecond/10));
                    updateTimecode();
                    if(hiddenVideo.src && hiddenVideo.duration) {
                        hiddenVideo.currentTime = globalTime / 10;
                    }
                }
            }

            function dragEnd(e) {
                document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove);
                document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd);
            }

            element.addEventListener('mousedown', dragStart);
            element.addEventListener('touchstart', dragStart, {passive: false});
        }

        // Aplicar arrastre a la línea roja
        makeDraggable(document.getElementById('playhead'), true);


        // --- CÁMARA Y GUARDADO DE VIDEO ---
        let mediaRecorder; let recordedChunks = []; let audioCtx; let mixerDest;

        async function toggleCamera() {
            if(!isCamActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "user"}, audio: { echoCancellation: true, noiseSuppression: true } });
                    hiddenCam.srcObject = stream;
                    isCamActive = true;
                    document.getElementById('btnToggleCam').classList.add('danger');
                    document.getElementById('btnToggleCam').innerHTML = '<i class="fa-solid fa-video-slash"></i> Apagar Cámara';
                    document.getElementById('camMode').value = "pip"; // Auto-encender PiP
                    
                    // Configurar Audio para grabación final
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    mixerDest = audioCtx.createMediaStreamDestination();
                    const micSource = audioCtx.createMediaStreamSource(stream);
                    micSource.connect(mixerDest);

                } catch(e) { alert("Otorga permisos de cámara/micrófono."); }
            } else {
                let stream = hiddenCam.srcObject;
                if(stream) stream.getTracks().forEach(t => t.stop());
                isCamActive = false;
                document.getElementById('btnToggleCam').classList.remove('danger');
                document.getElementById('btnToggleCam').innerHTML = '<i class="fa-solid fa-video"></i> Activar Cámara';
                document.getElementById('camMode').value = "none";
            }
        }

        function updateCamSettings() {
            if(document.getElementById('camMode').value !== 'none' && !isCamActive) {
                toggleCamera();
            }
        }

        function exportVideo() {
            if(recordedChunks.length > 0) recordedChunks = [];
            
            // Capturar el stream del Canvas a 30fps
            const canvasStream = canvas.captureStream(30);
            
            // Añadir audio si la cámara está activa
            if(mixerDest) {
                canvasStream.addTrack(mixerDest.stream.getAudioTracks()[0]);
            } else if (hiddenVideo.src) {
                // Si hay video subido, intentar capturar su audio (requiere crossOrigin)
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mixerDest = audioCtx.createMediaStreamDestination();
                const vidSource = audioCtx.createMediaElementSource(hiddenVideo);
                vidSource.connect(audioCtx.destination);
                vidSource.connect(mixerDest);
                canvasStream.addTrack(mixerDest.stream.getAudioTracks()[0]);
            }

            try { mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp9' }); } 
            catch (e) { mediaRecorder = new MediaRecorder(canvasStream); }

            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.style.display = 'none';
                a.href = url; a.download = `Produccion_CapacitiumX_${Date.now()}.webm`;
                document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
                document.getElementById('recBadge').style.display = 'none';
                alert("¡Video guardado en tus descargas!");
            };

            // Iniciar grabación de lo que pase en el lienzo
            resetPlayhead();
            document.getElementById('recBadge').style.display = 'block';
            mediaRecorder.start();
            togglePlayback(); // Reproducir línea de tiempo automáticamente
            
            // Detener grabación a los 10 segundos por defecto (o puedes detenerla manual si haces un botón)
            setTimeout(() => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); togglePlayback(); }, 10000);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
