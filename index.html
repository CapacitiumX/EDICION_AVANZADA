<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapacitiumX Studio V22 - Multi Import</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #3b82f6; --bg: #050507; --panel: #121216; --track-bg: #1f1f23; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; user-select: none; }

        .app-header { background: var(--panel); padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-weight: 600; font-size: 14px; align-items: center; }
        .btn-save { background: linear-gradient(90deg, #10b981, #059669); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .autosave-badge { font-size: 10px; color: #888; display: flex; align-items: center; gap: 5px; }
        
        .preview-area { background: #000; display: flex; justify-content: center; padding: 10px; height: 30vh; border-bottom: 1px solid #333; position: relative; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; border-radius: 8px; background: #0a0a0a; object-fit: contain; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .status-rec { position: absolute; top: 15px; right: 20px; background: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: none; animation: pulse 1.5s infinite; z-index: 50; }

        .timeline-editor { background: var(--panel); display: flex; flex-direction: column; height: 32vh; border-bottom: 1px solid #333; }
        .timeline-toolbar { display: flex; gap: 15px; padding: 10px 12px; background: #000; font-size: 14px; align-items: center; border-bottom: 1px solid #222; }
        .action-btn { cursor: pointer; color: #a1a1aa; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: white; transform: scale(1.1); }
        .action-btn.active-play { color: #10b981; }

        .tracks-container { flex: 1; padding: 10px 0; overflow-x: auto; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; position: relative; }
        .track { height: 40px; background: var(--track-bg); display: flex; position: relative; min-width: 300vw; border-bottom: 1px solid #2a2a30; }
        .track-label { position: sticky; left: 0; background: #0a0a0c; width: 45px; display: flex; justify-content: center; align-items: center; font-size: 10px; z-index: 30; border-right: 1px solid #444; flex-direction: column; color: #aaa; font-weight: bold; }
        
        .export-zone { position: absolute; top: 0; bottom: 0; background: rgba(16, 185, 129, 0.1); z-index: 5; pointer-events: none; border-top: 2px solid #10b981; border-bottom: 2px solid #eab308; }
        .marker-in { position: absolute; top: 0; bottom: 0; width: 4px; background: #10b981; z-index: 35; cursor: ew-resize; }
        .marker-in::before { content: 'INICIO'; position: absolute; top: -10px; left: 0; background: #10b981; font-size: 8px; padding: 2px 4px; border-radius: 2px; color: white; font-weight: bold; }
        .marker-out { position: absolute; top: 0; bottom: 0; width: 4px; background: #eab308; z-index: 35; cursor: ew-resize; box-shadow: 0 0 10px rgba(234, 179, 8, 0.8); }
        .marker-out::before { content: 'FIN DE VIDEO'; position: absolute; top: -10px; left: -30px; background: #eab308; font-size: 8px; padding: 2px 4px; border-radius: 2px; color: black; font-weight: bold; }

        .playhead-container { position: absolute; top: 0; bottom: 0; left: 45px; width: 20px; z-index: 40; transform: translateX(-10px); cursor: ew-resize; }
        .playhead-line { position: absolute; left: 10px; width: 2px; height: 100%; background: #ffffff; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .playhead-head { position: absolute; left: 5px; top: 0; width: 12px; height: 12px; background: #ffffff; clip-path: polygon(0 0, 100% 0, 50% 100%); pointer-events: none; }

        .clip-block { position: absolute; height: 90%; top: 5%; background: linear-gradient(135deg, #2563eb, #3b82f6); border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: bold; opacity: 0.95; overflow: hidden; white-space: nowrap; border: 1px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 20; transition: border 0.1s; }
        .clip-block.image { background: linear-gradient(135deg, #d97706, #f59e0b); border-color: #fbbf24; }
        .clip-block.audio { background: linear-gradient(135deg, #059669, #10b981); border-color: #34d399; }
        .clip-block.text { background: linear-gradient(135deg, #7c3aed, #8b5cf6); border-color: #a78bfa; }
        .clip-block.offline { background: #333 !important; border-color: #555 !important; color: #ef4444; border-style: dashed; }
        .clip-block.selected { border: 2px solid white; opacity: 1; z-index: 25; box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        
        .fx-badge { position: absolute; bottom: 2px; right: 15px; font-size: 8px; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 2px; display: none; color: #fbbf24; }
        .clip-block.has-fx .fx-badge { display: block; }

        .resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 15px; background: rgba(255,255,255,0.1); cursor: ew-resize; z-index: 30; border-left: 1px solid rgba(255,255,255,0.3); border-radius: 0 4px 4px 0; }
        .drag-area { flex: 1; height: 100%; display: flex; align-items: center; cursor: grab; }
        .drag-area:active { cursor: grabbing; }

        .control-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .tab-menu { display: flex; background: var(--panel); overflow-x: auto; border-bottom: 1px solid #333; }
        .tab-btn { padding: 12px 16px; font-size: 12px; color: #a1a1aa; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--neon); background: rgba(59, 130, 246, 0.1); }
        .tab-content { flex: 1; padding: 15px; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .btn { background: #27272a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; font-size: 12px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #333; }
        .btn.primary { background: var(--neon); border: none; }
        .btn.primary:hover { background: #2563eb; }
        .btn.danger { background: #ef4444; border: none; }
        select, input[type="text"], input[type="color"] { background: #18181c; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%; box-sizing: border-box; outline: none; }
        select:focus, input[type="text"]:focus { border-color: var(--neon); }
        input[type="range"] { width: 100%; accent-color: var(--neon); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #hidden-media-container { display: none; }
        
        .project-list { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; }
        .project-item { background: #18181c; padding: 10px; border-radius: 6px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <span><i class="fa-solid fa-crown" style="color: #fbbf24;"></i> Estudio Pro V22</span>
            <div class="autosave-badge" id="saveIndicator"><i class="fa-solid fa-cloud"></i> Guardado</div>
        </div>
        <button class="btn-save" id="btnExport" onclick="exportVideo()"><i class="fa-solid fa-rocket"></i> EXPORTAR HASTA LÍNEA AMARILLA</button>
    </div>

    <div class="preview-area">
        <div class="status-rec" id="recBadge">GRABANDO</div>
        <canvas id="mainCanvas"></canvas>
        <video id="hiddenCam" autoplay playsinline style="display:none;" muted></video>
        <div id="hidden-media-container"></div>
    </div>

    <div class="timeline-editor">
        <div class="timeline-toolbar">
            <i class="fa-solid fa-play action-btn" id="btnPlay" onclick="togglePlayback()" title="Reproducir/Pausar"></i>
            <i class="fa-solid fa-backward action-btn" onclick="resetPlayhead()" title="Ir al Inicio"></i>
            <div style="width: 1px; height: 15px; background: #555; margin: 0 10px;"></div>
            
            <i class="fa-solid fa-scissors action-btn" onclick="splitSelectedClip()" title="Corte Quirúrgico (Tijeras)" style="color: #f59e0b;"></i>
            <i class="fa-solid fa-copy action-btn" onclick="duplicateSelectedClip()" title="Duplicar Capa"></i>
            <i class="fa-solid fa-trash action-btn" onclick="deleteSelectedClip()" title="Eliminar Capa" style="color: #ef4444;"></i>
            <span id="timecode" style="margin-left: auto; font-family: monospace; color: #10b981;">00:00.0</span>
        </div>
        
        <div class="tracks-container" id="timelineScroll">
            <!-- DELIMITADORES -->
            <div class="export-zone" id="exportZone"></div>
            <div class="marker-in" id="markerIn"></div>
            <div class="marker-out" id="markerOut"></div>

            <div class="playhead-container" id="playhead">
                <div class="playhead-head"></div>
                <div class="playhead-line"></div>
            </div>
            
            <div class="track" id="videoTrack"><div class="track-label"><i class="fa-solid fa-video"></i> Vid</div></div>
            <div class="track" id="imageTrack"><div class="track-label"><i class="fa-solid fa-image"></i> Img</div></div>
            <div class="track" id="textTrack"><div class="track-label"><i class="fa-solid fa-font"></i> Txt</div></div>
            <div class="track" id="audioTrack"><div class="track-label"><i class="fa-solid fa-microphone"></i> Voz</div></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="tab-menu">
            <div class="tab-btn active" onclick="switchTab('media')"><i class="fa-solid fa-folder-open"></i> Medios</div>
            <div class="tab-btn" onclick="switchTab('fx')"><i class="fa-solid fa-wand-magic-sparkles"></i> Diseño & FX 15+</div>
            <div class="tab-btn" onclick="switchTab('voice')"><i class="fa-solid fa-microphone"></i> Narración</div>
        </div>

        <div id="media" class="tab-content active">
            <!-- NOTA: Añadido "multiple" para permitir seleccionar varias fotos/videos de jalón -->
            <div class="btn primary" onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-film"></i> Cargar Varias Fotos / Videos de jalón</div>
            <input type="file" id="fileUpload" accept="image/*,video/*" multiple style="display:none;" onchange="addMediaToTimeline(event)">
            
            <div style="background: #121216; padding: 10px; border-radius: 6px; margin-top: 5px; border: 1px solid #333;">
                <label style="font-size: 11px; color: #aaa;">Volumen del Video Original (Ideal para Doblaje)</label>
                <input type="range" id="masterVolume" min="0" max="100" value="100" oninput="updateMasterVolume()">
            </div>
        </div>

        <div id="fx" class="tab-content">
            <div style="background: #121216; padding: 12px; border-radius: 6px; border: 1px solid #3b82f6; position: relative;">
                <span style="position:absolute; top:-8px; left:10px; background:#3b82f6; font-size:9px; padding:2px 6px; border-radius:4px; font-weight:bold;">EFECTOS EXCLUSIVOS AL CLIP SELECCIONADO</span>
                <div class="grid-2" style="margin-top: 5px;">
                    <div>
                        <label style="font-size: 9px; color: #888;">Filtros de Color (15)</label>
                        <select id="clipFilter">
                            <option value="none">1. Original</option>
                            <option value="sepia(100%)">2. Retro (Sepia)</option>
                            <option value="grayscale(100%) contrast(120%)">3. Cine B/N</option>
                            <option value="brightness(110%) contrast(120%) saturate(140%)">4. Cinemático (Vivos)</option>
                            <option value="contrast(130%) saturate(10%) sepia(30%) hue-rotate(180deg)">5. Cyberpunk Oscuro</option>
                            <option value="brightness(80%) contrast(140%)">6. Documental Drama</option>
                            <option value="hue-rotate(90deg) saturate(150%)">7. Alien / Tóxico</option>
                            <option value="invert(100%)">8. Visión Nocturna / Negativo</option>
                            <option value="sepia(50%) hue-rotate(320deg) saturate(200%)">9. Atardecer Cálido</option>
                            <option value="sepia(50%) hue-rotate(200deg) saturate(150%)">10. Frío Metálico</option>
                            <option value="contrast(200%) grayscale(100%)">11. Noir Extremo</option>
                            <option value="saturate(300%)">12. Saturación Máx</option>
                            <option value="blur(3px) contrast(150%)">13. Sueño / Flashback</option>
                            <option value="brightness(150%)">14. Sobreexpuesto</option>
                            <option value="sepia(80%) contrast(110%) brightness(90%)">15. Vintage 90s</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 9px; color: #888;">Animaciones/Transiciones (15)</label>
                        <select id="clipAnim">
                            <option value="none">1. Sin Movimiento</option>
                            <option value="fade">2. Fade In/Out Suave</option>
                            <option value="zoom-in">3. Zoom In Lento</option>
                            <option value="zoom-out">4. Zoom Out Lento</option>
                            <option value="slide-left">5. Entra por Izquierda</option>
                            <option value="slide-right">6. Entra por Derecha</option>
                            <option value="slide-up">7. Sube desde Abajo</option>
                            <option value="slide-down">8. Baja desde Arriba</option>
                            <option value="spin-in">9. Giro 360 Dinámico</option>
                            <option value="pop">10. Efecto Pop (Rebote)</option>
                            <option value="shake">11. Temblor / Sismo</option>
                            <option value="pulse">12. Latido de Corazón</option>
                            <option value="flash">13. Parpadeo Flash</option>
                            <option value="cinematic-pan">14. Paneo Lateral Cine</option>
                            <option value="blur-in">15. Aparece Desenfocado</option>
                        </select>
                    </div>
                </div>
                <button class="btn primary" onclick="applyFXToSelected()" style="width: 100%; margin-top: 10px; padding: 8px;"><i class="fa-solid fa-check-double"></i> Aplicar al Cuadrito Seleccionado</button>
            </div>
            
            <div style="background: #121216; padding: 10px; border-radius: 6px; border: 1px solid #333; margin-top: 10px;">
                <label style="font-size: 11px; color: #aaa;">Añadir Texto</label>
                <input type="text" id="overlayText" placeholder="Escribe tu guion o título..." style="margin-bottom: 5px;" oninput="liveUpdateText()">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                    <div><label style="font-size: 9px; color: #888;">Fuente</label><select id="textFont" onchange="liveUpdateText()"><option value="sans-serif">Arial</option><option value="serif">Times</option><option value="Impact">Impact</option><option value="Courier New">Máquina Escribir</option></select></div>
                    <div><label style="font-size: 9px; color: #888;">Color Letra</label><input type="color" id="overlayColor" value="#ffffff" oninput="liveUpdateText()"></div>
                    <div><label style="font-size: 9px; color: #888;">Color Fondo</label><input type="color" id="overlayBg" value="#e50000" oninput="liveUpdateText()"></div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: center;">
                    <label style="font-size: 10px; color: #aaa; flex: 1;"><input type="checkbox" id="useBg" checked onchange="liveUpdateText()"> Habilitar Fondo</label>
                    <button class="btn primary" onclick="addTextToTimeline()" style="padding: 8px 15px;"><i class="fa-solid fa-plus"></i> Añadir Capa</button>
                </div>
            </div>

            <div class="grid-2" style="margin-top: 10px;">
                <button class="btn primary" onclick="document.getElementById('stickerUpload').click()"><i class="fa-solid fa-image"></i> Añadir Foto / Logo (Múltiples)</button>
                <div>
                    <label style="font-size: 11px; color: #aaa;">Tamaño Texto/Foto Seleccionado</label>
                    <input type="range" id="elementSize" min="10" max="800" value="60" oninput="updateSelectedOverlaySize()">
                </div>
            </div>
            <!-- También activamos el upload multiple para stickers si gustas -->
            <input type="file" id="stickerUpload" accept="image/*" multiple style="display:none;" onchange="addStickerToTimeline(event)">
        </div>

        <div id="voice" class="tab-content">
            <label style="font-size: 11px; color: #aaa; text-align: center;">Micrófono IA (Aislamiento Acústico Activo)</label>
            <div class="btn primary" id="btnRecVoice" onclick="toggleVoiceRecord()" style="padding: 16px; margin-top: 10px; font-size: 14px;"><i class="fa-solid fa-microphone"></i> Grabar Narración en Off</div>
        </div>
    </div>

    <script>
        let audioCtx; let audioMixer; 
        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioMixer = audioCtx.createMediaStreamDestination(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const canvas = document.getElementById('mainCanvas'); const ctx = canvas.getContext('2d'); canvas.width = 1280; canvas.height = 720;
        const hiddenCam = document.getElementById('hiddenCam'); const mediaContainer = document.getElementById('hidden-media-container');
        
        let projectClips = []; 
        let selectedClipEl = null; let isDraggingOverlay = false; let isExporting = false;

        // --- SISTEMA DE AUTOGUARDADO ---
        let currentProjectId = Date.now().toString();

        function triggerAutosave() {
            const ind = document.getElementById('saveIndicator');
            ind.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
            
            let saveData = projectClips.map(c => {
                return {
                    id: c.id, type: c.type, startPx: c.startPx, widthPx: c.widthPx, offsetPx: c.offsetPx,
                    content: c.content, color: c.color, font: c.font, useBg: c.useBg, bgColor: c.bgColor,
                    x: c.x, y: c.y, size: c.size, filter: c.filter, anim: c.anim, ratio: c.ratio,
                    base64Data: c.base64Data || null,
                    isOffline: (c.type === 'video') 
                };
            });

            let projectInfo = { id: currentProjectId, name: "Proyecto Actual", date: new Date().toLocaleString(), markers: { in: inMarkerX, out: outMarkerX }, clips: saveData };
            let allProjects = JSON.parse(localStorage.getItem('capacitiumProjects') || '[]');
            let existingIdx = allProjects.findIndex(p => p.id === currentProjectId);
            if(existingIdx >= 0) { allProjects[existingIdx] = projectInfo; } else { allProjects.push(projectInfo); }
            
            try { localStorage.setItem('capacitiumProjects', JSON.stringify(allProjects)); setTimeout(() => { ind.innerHTML = '<i class="fa-solid fa-check" style="color:#10b981;"></i> Guardado'; }, 500); } 
            catch (e) { ind.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444;"></i> Memoria Llena'; }
        }

        // --- SISTEMA DE MARCADORES (IN / OUT) ---
        let inMarkerX = 45; let outMarkerX = 300; 

        function updateExportZone() {
            document.getElementById('markerIn').style.left = inMarkerX + 'px'; document.getElementById('markerOut').style.left = outMarkerX + 'px'; document.getElementById('exportZone').style.left = inMarkerX + 'px'; document.getElementById('exportZone').style.width = Math.max(0, outMarkerX - inMarkerX) + 'px';
        }
        updateExportZone();

        function makeMarkerDraggable(element, type) {
            let startX = 0, currentLeft = 0;
            function dragStart(e) { e.preventDefault(); startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; currentLeft = parseInt(element.style.left || 45); document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove, {passive: false}); document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd); }
            function dragMove(e) { e.preventDefault(); let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; let newLeft = currentLeft + (x - startX); if(newLeft < 45) newLeft = 45;
                if(type === 'in') { if (newLeft > outMarkerX - 10) newLeft = outMarkerX - 10; inMarkerX = newLeft; } else { if (newLeft < inMarkerX + 10) newLeft = inMarkerX + 10; outMarkerX = newLeft; } updateExportZone();
            }
            function dragEnd(e) { document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove); document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd); triggerAutosave(); }
            element.addEventListener('mousedown', dragStart); element.addEventListener('touchstart', dragStart, {passive: false});
        }
        makeMarkerDraggable(document.getElementById('markerIn'), 'in'); makeMarkerDraggable(document.getElementById('markerOut'), 'out');

        function updateMasterVolume() { let vol = document.getElementById('masterVolume').value / 100; projectClips.forEach(c => { if (c.type === 'video' && c.domElement) c.domElement.volume = vol; }); }

        // --- SISTEMA FX POR CLIP (15+ OPCIONES) ---
        function applyFXToSelected() {
            if(!selectedClipEl) return alert("Toca un cuadrito en la línea de tiempo primero.");
            let id = selectedClipEl.getAttribute('data-id'); let clip = projectClips.find(c => c.id == id);
            if(clip) {
                clip.filter = document.getElementById('clipFilter').value; clip.anim = document.getElementById('clipAnim').value;
                selectedClipEl.classList.add('has-fx');
                if (selectedClipEl.querySelector('.fx-badge') === null) { selectedClipEl.innerHTML += `<div class="fx-badge"><i class="fa-solid fa-wand-magic-sparkles"></i></div>`; }
                triggerAutosave(); alert("Efecto Premium aplicado a este clip.");
            }
        }

        function getTransformValues(anim, progress, progressIn, progressOut) {
            let scale = 1, tx = 0, ty = 0, angle = 0, alpha = 1, extraFilter = '';
            switch(anim) {
                case 'fade': alpha = Math.min(progressIn, progressOut); break;
                case 'zoom-in': scale = 1 + (progress * 0.3); break;
                case 'zoom-out': scale = 1.3 - (progress * 0.3); break;
                case 'slide-left': if(progressIn < 1) tx = (1 - Math.pow(progressIn, 3)) * 1280; break;
                case 'slide-right': if(progressIn < 1) tx = -(1 - Math.pow(progressIn, 3)) * 1280; break;
                case 'slide-up': if(progressIn < 1) ty = (1 - Math.pow(progressIn, 3)) * 720; break;
                case 'slide-down': if(progressIn < 1) ty = -(1 - Math.pow(progressIn, 3)) * 720; break;
                case 'spin-in': if(progressIn < 1) { angle = (1 - progressIn) * Math.PI * 4; scale = progressIn; alpha = progressIn; } break;
                case 'pop': if(progressIn < 1) { scale = progressIn + Math.sin(progressIn * Math.PI) * 0.5; } break;
                case 'shake': tx = Math.sin(progress * 200) * 15; ty = Math.cos(progress * 180) * 15; break;
                case 'pulse': scale = 1 + Math.sin(progress * 30) * 0.08; break;
                case 'flash': alpha = Math.abs(Math.sin(progress * 40)); break;
                case 'cinematic-pan': tx = (progress - 0.5) * 150; scale = 1.1; break;
                case 'blur-in': if(progressIn < 1) { extraFilter = ` blur(${(1-progressIn)*20}px)`; alpha = progressIn; } break;
            }
            return {scale, tx, ty, angle, alpha, extraFilter};
        }

        // --- CORTE QUIRÚRGICO (TIJERAS) ---
        function splitSelectedClip() {

                        });

                        voiceStream.getTracks().forEach(t => t.stop());
                        let endClip = playheadX + finalWidth; if (endClip > outMarkerX) { outMarkerX = endClip; updateExportZone(); } playheadX += finalWidth; document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode();
                    };
                    voiceStartTime = Date.now(); voiceRecorder.start(); isRecordingVoice = true; btn.classList.add('danger'); btn.innerHTML = '<i class="fa-solid fa-stop"></i> Detener Narración'; badge.innerHTML = 'GRABANDO VOZ'; badge.style.display = 'block';
                    if(!isPlaying) togglePlayback(); 
                } catch(e) { alert("Permite acceso al micrófono."); }
            } else { voiceRecorder.stop(); isRecordingVoice = false; if(isPlaying) togglePlayback(); btn.classList.remove('danger'); btn.innerHTML = '<i class="fa-solid fa-microphone"></i> Grabar Narración en Off'; badge.style.display = 'none'; }
        }

        // --- EXPORTAR ---
        let mainRecorder; let exportChunks = [];
        function exportVideo() {
            initAudio(); if(projectClips.length === 0) return alert("Agrega medios antes de exportar."); if(selectedClipEl) selectedClipEl.classList.remove('selected'); selectedClipEl = null; if(exportChunks.length > 0) exportChunks = [];
            const finalStream = canvas.captureStream(30); if (audioMixer && audioMixer.stream.getAudioTracks().length > 0) finalStream.addTrack(audioMixer.stream.getAudioTracks()[0]);
            try { mainRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm;codecs=vp9,opus' }); } catch (e) { mainRecorder = new MediaRecorder(finalStream); }
            mainRecorder.ondataavailable = e => { if (e.data.size > 0) exportChunks.push(e.data); };
            mainRecorder.onstop = () => {
                isExporting = false; const blob = new Blob(exportChunks, { type: 'video/webm' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = `CapacitiumX_Produccion_${Date.now()}.webm`; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
                document.getElementById('recBadge').style.display = 'none'; document.getElementById('btnExport').innerHTML = '<i class="fa-solid fa-rocket"></i> EXPORTAR ZONA'; alert("¡Exportación completada!");
            };
            
            resetPlayhead(); isExporting = true; document.getElementById('recBadge').innerHTML = "EXPORTANDO ZONA..."; document.getElementById('recBadge').style.display = 'block'; document.getElementById('btnExport').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...';
            mainRecorder.start(); togglePlayback(); 
        }

        function switchTab(tabId) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tabId).classList.add('active'); event.currentTarget.classList.add('active'); }
    </script>
</body>
