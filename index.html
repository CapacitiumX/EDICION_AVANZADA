<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapacitiumX Pro Editor V10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #3b82f6; --bg: #09090b; --panel: #18181b; --track-bg: #27272a; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; user-select: none; }

        .app-header { background: var(--panel); padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-weight: 600; font-size: 14px; align-items: center; }
        .btn-save { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; }
        
        .preview-area { background: #000; display: flex; justify-content: center; padding: 10px; height: 30vh; border-bottom: 1px solid #333; position: relative; }
        canvas { max-width: 100%; max-height: 100%; border-radius: 8px; background: #111; object-fit: contain; cursor: crosshair; }
        .status-rec { position: absolute; top: 15px; right: 20px; background: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: none; animation: pulse 1.5s infinite; z-index: 50; }

        .timeline-editor { background: var(--panel); display: flex; flex-direction: column; height: 32vh; border-bottom: 1px solid #333; }
        .timeline-toolbar { display: flex; gap: 15px; padding: 10px 12px; background: #000; font-size: 14px; align-items: center; }
        .action-btn { cursor: pointer; color: #a1a1aa; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: white; }
        .action-btn.active-play { color: #10b981; }

        .tracks-container { flex: 1; padding: 10px 0; overflow-x: auto; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; position: relative; }
        .track { height: 40px; background: var(--track-bg); display: flex; position: relative; min-width: 300vw; border-bottom: 1px solid #333; }
        .track-label { position: sticky; left: 0; background: #111; width: 45px; display: flex; justify-content: center; align-items: center; font-size: 10px; z-index: 30; border-right: 1px solid #555; flex-direction: column; color: #aaa; }
        
        .playhead-container { position: absolute; top: 0; bottom: 0; left: 45px; width: 20px; z-index: 40; transform: translateX(-10px); cursor: ew-resize; }
        .playhead-line { position: absolute; left: 10px; width: 2px; height: 100%; background: #ef4444; pointer-events: none; }
        .playhead-head { position: absolute; left: 5px; top: 0; width: 12px; height: 12px; background: #ef4444; clip-path: polygon(0 0, 100% 0, 50% 100%); pointer-events: none; }

        .clip-block { position: absolute; height: 90%; top: 5%; background: #3b82f6; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: bold; opacity: 0.9; overflow: hidden; white-space: nowrap; border: 1px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 20; }
        .clip-block.image { background: #f59e0b; border-color: #fbbf24; }
        .clip-block.audio { background: #10b981; border-color: #34d399; }
        .clip-block.text { background: #8b5cf6; border-color: #a78bfa; }
        .clip-block.selected { border: 2px solid white; opacity: 1; z-index: 25; }
        
        .resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 15px; background: rgba(255,255,255,0.2); cursor: ew-resize; z-index: 30; border-left: 1px solid rgba(255,255,255,0.5); border-radius: 0 4px 4px 0; }
        .drag-area { flex: 1; height: 100%; display: flex; align-items: center; cursor: grab; }
        .drag-area:active { cursor: grabbing; }

        .control-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .tab-menu { display: flex; background: var(--panel); overflow-x: auto; border-bottom: 1px solid #333; }
        .tab-btn { padding: 12px 16px; font-size: 12px; color: #a1a1aa; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--neon); }
        .tab-content { flex: 1; padding: 15px; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .btn { background: #27272a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; font-size: 12px; text-align: center; cursor: pointer; font-weight: bold; }
        .btn.primary { background: var(--neon); border: none; }
        .btn.danger { background: #ef4444; border: none; }
        select, input[type="text"], input[type="color"] { background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%; box-sizing: border-box; outline: none; }
        input[type="range"] { width: 100%; accent-color: var(--neon); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #hidden-media-container { display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header">
        <span><i class="fa-solid fa-film"></i> Estudio Pro V10</span>
        <button class="btn-save" id="btnExport" onclick="exportVideo()"><i class="fa-solid fa-download"></i> EXPORTAR</button>
    </div>

    <div class="preview-area">
        <div class="status-rec" id="recBadge">GRABANDO</div>
        <canvas id="mainCanvas"></canvas>
        <video id="hiddenCam" autoplay playsinline style="display:none;" muted></video>
        <div id="hidden-media-container"></div>
    </div>

    <div class="timeline-editor">
        <div class="timeline-toolbar">
            <i class="fa-solid fa-play action-btn" id="btnPlay" onclick="togglePlayback()" title="Reproducir"></i>
            <i class="fa-solid fa-backward action-btn" onclick="resetPlayhead()" title="Al inicio"></i>
            <div style="width: 1px; height: 15px; background: #555; margin: 0 10px;"></div>
            
            <!-- Herramienta de Corte (Tijeras) -->
            <i class="fa-solid fa-scissors action-btn" onclick="splitSelectedClip()" title="Cortar en cabezal" style="color: #f59e0b;"></i>
            
            <i class="fa-solid fa-copy action-btn" onclick="duplicateSelectedClip()" title="Duplicar"></i>
            <i class="fa-solid fa-trash action-btn" onclick="deleteSelectedClip()" title="Borrar"></i>
            <span id="timecode" style="margin-left: auto; font-family: monospace; color: #10b981;">00:00.0</span>
        </div>
        
        <div class="tracks-container" id="timelineScroll">
            <div class="playhead-container" id="playhead">
                <div class="playhead-head"></div>
                <div class="playhead-line"></div>
            </div>
            
            <div class="track" id="videoTrack">
                <div class="track-label"><i class="fa-solid fa-video"></i> Vid</div>
            </div>
            <div class="track" id="imageTrack">
                <div class="track-label"><i class="fa-solid fa-image"></i> Img</div>
            </div>
            <div class="track" id="textTrack">
                <div class="track-label"><i class="fa-solid fa-font"></i> Txt</div>
            </div>
            <div class="track" id="audioTrack">
                <div class="track-label"><i class="fa-solid fa-microphone"></i> Voz</div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="tab-menu">
            <div class="tab-btn active" onclick="switchTab('media')"><i class="fa-solid fa-folder-open"></i> Medios</div>
            <div class="tab-btn" onclick="switchTab('fx')"><i class="fa-solid fa-font"></i> Textos y FX</div>
            <div class="tab-btn" onclick="switchTab('voice')"><i class="fa-solid fa-microphone"></i> Voz off</div>
            <div class="tab-btn" onclick="switchTab('camera')"><i class="fa-solid fa-camera"></i> PiP</div>
        </div>

        <!-- MEDIOS -->
        <div id="media" class="tab-content active">
            <div class="btn primary" onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-plus"></i> Importar Foto / Video Base</div>
            <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none;" onchange="addMediaToTimeline(event)">
            <p style="font-size: 11px; color: #888; text-align: center;">Toca un clip y usa las tijeras amarillas arriba para cortarlo por la mitad.</p>
        </div>

        <!-- TEXTOS Y STICKERS AMPLIADOS -->
        <div id="fx" class="tab-content">
            <div style="background: #111; padding: 10px; border-radius: 6px; border: 1px solid #333;">
                <label style="font-size: 11px; color: #aaa;">Texto</label>
                <input type="text" id="overlayText" placeholder="Escribe aquí..." style="margin-bottom: 5px;">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                    <div>
                        <label style="font-size: 9px; color: #888;">Fuente</label>
                        <select id="textFont">
                            <option value="sans-serif">Arial / Sans</option>
                            <option value="serif">Times / Serif</option>
                            <option value="monospace">Courier / Mono</option>
                            <option value="Impact">Impact (Bold)</option>
                            <option value="Comic Sans MS">Casual</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 9px; color: #888;">Color Texto</label>
                        <input type="color" id="overlayColor" value="#ffffff">
                    </div>
                    <div>
                        <label style="font-size: 9px; color: #888;">Fondo Texto</label>
                        <input type="color" id="overlayBg" value="#000000">
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: center;">
                    <label style="font-size: 10px; color: #aaa; flex: 1;"><input type="checkbox" id="useBg" checked> Activar Fondo</label>
                    <button class="btn primary" onclick="addTextToTimeline()" style="padding: 8px 15px;"><i class="fa-solid fa-plus"></i> Añadir a Pista</button>
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <label style="font-size: 11px; color: #aaa;">Filtro Visual Global</label>
                    <select id="videoFilter">
                        <option value="none">Normal</option>
                        <option value="sepia(100%)">Sepia</option>
                        <option value="grayscale(100%)">B/N</option>
                        <option value="brightness(60%) contrast(120%)">Cine Oscuro</option>
                        <option value="saturate(200%)">Colores Vivos</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 11px; color: #aaa;">Tamaño (Clip Seleccionado)</label>
                    <input type="range" id="elementSize" min="10" max="400" value="60" oninput="updateSelectedOverlaySize()">
                </div>
            </div>

            <div class="btn primary" onclick="document.getElementById('stickerUpload').click()"><i class="fa-solid fa-face-smile"></i> Añadir Sticker/Logo</div>
            <input type="file" id="stickerUpload" accept="image/*" style="display:none;" onchange="addStickerToTimeline(event)">
        </div>

        <!-- VOZ EN OFF -->
        <div id="voice" class="tab-content">
            <label style="font-size: 11px; color: #aaa; text-align: center;">Micrófono Podcast (Aislamiento de fondo activado)</label>
            <div class="btn primary" id="btnRecVoice" onclick="toggleVoiceRecord()" style="padding: 16px;"><i class="fa-solid fa-microphone"></i> Iniciar Grabación de Voz</div>
        </div>

        <!-- CÁMARA PIP -->
        <div id="camera" class="tab-content">
            <div class="btn primary" id="btnToggleCam" onclick="toggleCamera()"><i class="fa-solid fa-video"></i> Activar Cámara (Sin Audio)</div>
            <div class="grid-2" style="margin-top: 10px;">
                <div>
                    <label style="font-size: 11px; color: #aaa;">Ubicación</label>
                    <select id="camMode" onchange="updateCamSettings()">
                        <option value="none">Oculta</option>
                        <option value="pip">Miniatura PiP</option>
                        <option value="full">Pantalla Completa</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 11px; color: #aaa;">Fondo Virtual</label>
                    <select id="camBg" onchange="updateCamSettings()">
                        <option value="none">Mi fondo real</option>
                        <option value="neon">Estudio Neon</option>
                        <option value="dark">Set Premium</option>
                    </select>
                </div>
            </div>
            <label style="font-size: 11px; color: #aaa; margin-top: 5px;">Recorte de Chroma Key</label>
            <input type="range" id="chromaTol" min="0" max="150" value="60">
        </div>
    </div>

    <script>
        let audioCtx; let audioMixer; 
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioMixer = audioCtx.createMediaStreamDestination();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const canvas = document.getElementById('mainCanvas'); 
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;
        const hiddenCam = document.getElementById('hiddenCam');
        const mediaContainer = document.getElementById('hidden-media-container');
        
        let projectClips = []; 
        let selectedClipEl = null; 
        let isCamActive = false;
        let isDraggingOverlay = false;
        let isExporting = false;

        // --- SISTEMA NLE AVANZADO (CORTAR Y TEXTOS) ---

        function addTextToTimeline() {
            const text = document.getElementById('overlayText').value;
            if (!text) return;
            const color = document.getElementById('overlayColor').value;
            const font = document.getElementById('textFont').value;
            const useBg = document.getElementById('useBg').checked;
            const bgColor = document.getElementById('overlayBg').value;
            const clipId = Date.now();

            const clipUi = document.createElement('div');
            clipUi.className = 'clip-block text';
            clipUi.style.left = playheadX + 'px'; clipUi.style.width = '150px';
            clipUi.setAttribute('data-id', clipId);
            clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-font"></i> &nbsp;${text.substring(0,6)}...</div>`;
            
            makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId);
            clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
            document.getElementById('textTrack').appendChild(clipUi);

            projectClips.push({
                id: clipId, type: 'text', content: text, color: color, font: font, useBg: useBg, bgColor: bgColor,
                x: 640, y: 360, size: 60, startPx: playheadX, widthPx: 150, offsetPx: 0
            });

            document.getElementById('overlayText').value = '';
            playheadX += 160; document.getElementById('playhead').style.left = playheadX + 'px';
            updateTimecode();
        }

        function splitSelectedClip() {
            if(!selectedClipEl) return alert("Selecciona un clip para cortarlo.");
            const id = selectedClipEl.getAttribute('data-id');
            const orig = projectClips.find(c => c.id == id);
            if(!orig) return;

            // Verificar que la línea roja esté dentro del clip
            if(playheadX <= orig.startPx || playheadX >= orig.startPx + orig.widthPx) {
                return alert("Coloca la línea roja (cabezal) sobre el clip seleccionado para hacer el corte.");
            }

            const leftWidth = playheadX - orig.startPx;
            const rightWidth = orig.widthPx - leftWidth;
            const newId = Date.now();

            // 1. Acortar el clip original (Lado Izquierdo)
            orig.widthPx = leftWidth;
            selectedClipEl.style.width = leftWidth + 'px';

            // 2. Crear el nuevo clip (Lado Derecho)
            const clipUi = document.createElement('div');
            clipUi.className = selectedClipEl.className;
            clipUi.classList.remove('selected');
            clipUi.style.left = playheadX + 'px';
            clipUi.style.width = rightWidth + 'px';
            clipUi.setAttribute('data-id', newId);
            clipUi.innerHTML = selectedClipEl.innerHTML;

            makeDraggable(clipUi, false, newId); makeResizable(clipUi, newId);
            clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
            selectedClipEl.parentElement.appendChild(clipUi);

            // 3. Clonar datos y calcular OFFSET (Clave para NLE)
            let newOffset = orig.offsetPx + leftWidth;
            let newDom = orig.domElement; 
            
            // Si es video/audio, necesitamos duplicar el elemento HTML para que pueda reproducirse independientemente si se mueven
            if (orig.type === 'video' || orig.type === 'audio') {
                newDom = orig.domElement.cloneNode(true);
                mediaContainer.appendChild(newDom);
                if (orig.type === 'video') {
                    newDom.oncanplay = () => {
                        if (!newDom.hasAudioConnected) {
                            try {
                                const source = audioCtx.createMediaElementSource(newDom);
                                source.connect(audioCtx.destination); source.connect(audioMixer); 
                                newDom.hasAudioConnected = true;
                            } catch(e) {} 
                        }
                    };
                }
            }

            projectClips.push({
                ...orig, id: newId, startPx: playheadX, widthPx: rightWidth, offsetPx: newOffset, domElement: newDom
            });
        }

        // --- RESTO DE FUNCIONES UI (Mismo que V9 pero adaptado a offsetPx) ---
        function addStickerToTimeline(event) {
            const file = event.target.files[0]; if (!file) return;
            const img = new Image();
            img.onload = () => {
                const clipId = Date.now();
                const clipUi = document.createElement('div'); clipUi.className = 'clip-block image';
                clipUi.style.left = playheadX + 'px'; clipUi.style.width = '100px';
                clipUi.setAttribute('data-id', clipId); clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-face-smile"></i> &nbsp;Sticker</div>`;
                makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId);
                clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
                document.getElementById('textTrack').appendChild(clipUi); 
                
                projectClips.push({ id: clipId, type: 'sticker', imgObj: img, ratio: img.height / img.width, x: 640, y: 360, size: 200, startPx: playheadX, widthPx: 100, offsetPx: 0 });
                playheadX += 110; document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode();
            };
            img.src = URL.createObjectURL(file);
        }

        function duplicateSelectedClip() {
            if (!selectedClipEl) return;
            const id = selectedClipEl.getAttribute('data-id');
            const original = projectClips.find(c => c.id == id);
            
            if (original && (original.type === 'text' || original.type === 'sticker')) {
                const newId = Date.now();
                const clipUi = document.createElement('div');
                clipUi.className = selectedClipEl.className;
                clipUi.style.left = playheadX + 'px'; clipUi.style.width = original.widthPx + 'px';
                clipUi.setAttribute('data-id', newId); clipUi.innerHTML = selectedClipEl.innerHTML;
                makeDraggable(clipUi, false, newId); makeResizable(clipUi, newId);
                clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
                selectedClipEl.parentElement.appendChild(clipUi);

                let newClip = {...original, id: newId, startPx: playheadX, y: original.y + 40, offsetPx: 0}; 
                projectClips.push(newClip);
                playheadX += original.widthPx + 10; document.getElementById('playhead').style.left = playheadX + 'px';
            }
        }

        function updateSelectedOverlaySize() {
            if (selectedClipEl) {
                const id = selectedClipEl.getAttribute('data-id');
                let clipObj = projectClips.find(c => c.id == id);
                if (clipObj && (clipObj.type === 'text' || clipObj.type === 'sticker')) {
                    clipObj.size = parseInt(document.getElementById('elementSize').value);
                }
            }
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }

        function handleCanvasStart(e) {
            const pos = getCanvasPos(e); let found = null;
            for (let i = projectClips.length - 1; i >= 0; i--) {
                let o = projectClips[i];
                if ((o.type === 'text' || o.type === 'sticker') && playheadX >= o.startPx && playheadX <= o.startPx + o.widthPx) {
                    if (o.type === 'text') {
                        ctx.font = `bold ${o.size}px ${o.font || 'sans-serif'}`;
                        let w = ctx.measureText(o.content).width; let h = o.size;
                        if (pos.x >= o.x - w/2 - 30 && pos.x <= o.x + w/2 + 30 && pos.y >= o.y - h - 30 && pos.y <= o.y + 30) { found = o; break; }
                    } else if (o.type === 'sticker') {
                        let w = o.size; let h = o.size * o.ratio;
                        if (pos.x >= o.x - w/2 - 30 && pos.x <= o.x + w/2 + 30 && pos.y >= o.y - h/2 - 30 && pos.y <= o.y + h/2 + 30) { found = o; break; }
                    }
                }
            }
            if (found) {
                isDraggingOverlay = true;
                let clipDom = document.querySelector(`.clip-block[data-id="${found.id}"]`);
                if (clipDom) {
                    if(selectedClipEl) selectedClipEl.classList.remove('selected');
                    selectedClipEl = clipDom; selectedClipEl.classList.add('selected');
                }
                document.getElementById('elementSize').value = found.size;
                e.preventDefault();
            }
        }
        function handleCanvasMove(e) {
            if (!isDraggingOverlay || !selectedClipEl) return;
            e.preventDefault(); const pos = getCanvasPos(e);
            const id = selectedClipEl.getAttribute('data-id'); let clipObj = projectClips.find(c => c.id == id);
            if(clipObj && (clipObj.type === 'text' || clipObj.type === 'sticker')) { clipObj.x = pos.x; clipObj.y = pos.y; }
        }
        function handleCanvasEnd(e) { isDraggingOverlay = false; }
        canvas.addEventListener('mousedown', handleCanvasStart); canvas.addEventListener('touchstart', handleCanvasStart, {passive: false});
        canvas.addEventListener('mousemove', handleCanvasMove);  canvas.addEventListener('touchmove', handleCanvasMove, {passive: false});
        window.addEventListener('mouseup', handleCanvasEnd);     window.addEventListener('touchend', handleCanvasEnd);

        // --- RENDERIZADO CON TEXTOS CON FONDO Y OFFSET ---
        function renderLoop() {
            ctx.fillStyle = "#111115"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            let activeVisualClip = null;
            for (let i = projectClips.length - 1; i >= 0; i--) {
                const clip = projectClips[i];
                if ((clip.type === 'video' || clip.type === 'image') && playheadX >= clip.startPx && playheadX <= clip.startPx + clip.widthPx) {
                    activeVisualClip = clip; break;
                }
            }

            projectClips.forEach(clip => {
                if (clip.domElement && (clip.type === 'video' || clip.type === 'audio')) {
                    let isUnderPlayhead = (playheadX >= clip.startPx && playheadX <= clip.startPx + clip.widthPx);
                    if (isUnderPlayhead && isPlaying) {
                        if (clip.domElement.paused) clip.domElement.play().catch(e => {});
                    } else {
                        if (!clip.domElement.paused) clip.domElement.pause();
                    }
                }
            });

            ctx.filter = document.getElementById('videoFilter').value; 
            
            if (activeVisualClip && activeVisualClip.domElement) {
                if(activeVisualClip.type === 'video' && activeVisualClip.domElement.readyState >= 2) {
                    ctx.drawImage(activeVisualClip.domElement, 0, 0, canvas.width, canvas.height);
                } else if (activeVisualClip.type === 'image') {
                    ctx.drawImage(activeVisualClip.domElement, 0, 0, canvas.width, canvas.height);
                }
            } else {
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("Lienzo CapacitiumX", canvas.width/2, canvas.height/2);
            }
            ctx.filter = 'none';

            if (isCamActive && hiddenCam.readyState >= 2) {
                const mode = document.getElementById('camMode').value; const bg = document.getElementById('camBg').value;
                if (mode !== 'none') {
                    let camW = mode === 'full' ? canvas.width : 400; let camH = mode === 'full' ? canvas.height : 300;
                    let camX = mode === 'full' ? 0 : canvas.width - camW - 20; let camY = mode === 'full' ? 0 : canvas.height - camH - 20;
                    if(mode === 'full' && bg !== 'none') {
                        if (bg === 'neon') {
                            let grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width);
                            grd.addColorStop(0, '#16092b'); grd.addColorStop(1, '#020007'); ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
                        } else if (bg === 'dark') { ctx.fillStyle = '#141416'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
                    }
                    if (bg !== 'none') {
                        let tempCanvas = document.createElement('canvas'); tempCanvas.width = camW; tempCanvas.height = camH;
                        let tCtx = tempCanvas.getContext('2d'); tCtx.drawImage(hiddenCam, 0, 0, camW, camH);
                        let frame = tCtx.getImageData(0, 0, camW, camH); let tol = parseInt(document.getElementById('chromaTol').value);
                        for (let i = 0; i < frame.data.length / 4; i++) {
                            let r = frame.data[i * 4]; let g = frame.data[i * 4 + 1]; let b = frame.data[i * 4 + 2];
                            if (g > tol && g > r * 1.1 && g > b * 1.1) frame.data[i * 4 + 3] = 0; 
                        }
                        tCtx.putImageData(frame, 0, 0); ctx.drawImage(tempCanvas, camX, camY);
                    } else { ctx.drawImage(hiddenCam, camX, camY, camW, camH); }
                }
            }

            // TEXTOS Y STICKERS CON FONDOS
            projectClips.forEach(o => {
                if ((o.type === 'text' || o.type === 'sticker') && playheadX >= o.startPx && playheadX <= o.startPx + o.widthPx) {
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    if (o.type === 'text') {
                        ctx.font = `bold ${o.size}px ${o.font || 'sans-serif'}`;
                        let w = ctx.measureText(o.content).width; let h = o.size;
                        
                        // Fondo del texto
                        if(o.useBg) {
                            ctx.fillStyle = o.bgColor || '#000000';
                            ctx.fillRect(o.x - w/2 - 15, o.y - h/2 - 10, w + 30, h + 20);
                        }
                        
                        ctx.strokeStyle = '#000000'; ctx.lineWidth = o.size / 10;
                        ctx.strokeText(o.content, o.x, o.y);
                        ctx.fillStyle = o.color; ctx.fillText(o.content, o.x, o.y);
                    } else if (o.type === 'sticker') {
                        let w = o.size; let h = o.size * o.ratio;
                        ctx.drawImage(o.imgObj, o.x - w/2, o.y - h/2, w, h);
                    }
                    
                    if (selectedClipEl && selectedClipEl.getAttribute('data-id') == o.id && !isExporting) {
                        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.setLineDash([10, 10]);
                        if (o.type === 'text') {
                            let w = ctx.measureText(o.content).width; let h = o.size;
                            ctx.strokeRect(o.x - w/2 - 15, o.y - h/2 - 15, w + 30, h + 30);
                        } else if (o.type === 'sticker') {
                            let w = o.size; let h = o.size * o.ratio;
                            ctx.strokeRect(o.x - w/2 - 5, o.y - h/2 - 5, w + 10, h + 10);
                        }
                        ctx.setLineDash([]);
                    }
                }
            });

            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // --- SISTEMA GENERAL (TIEMPOS Y EXPORTACIÓN DINÁMICA) ---
        let globalTime = 0; let isPlaying = false; let playInterval;
        let playheadX = 45; const pixelsPerSecond = 20; 

        function updateTimecode() { 
            let secs = Math.floor(globalTime / 10); let decs = globalTime % 10;
            document.getElementById('timecode').innerText = `00:${secs.toString().padStart(2,'0')}.${decs}`; 
        }

        function togglePlayback() {
            initAudio(); 
            const btn = document.getElementById('btnPlay');
            if (isPlaying) {
                clearInterval(playInterval); isPlaying = false;
                btn.classList.remove('fa-pause', 'active-play'); btn.classList.add('fa-play');
            } else {
                isPlaying = true;
                btn.classList.remove('fa-play'); btn.classList.add('fa-pause', 'active-play');
                
                // Buscar el límite final del proyecto (EXPORTACIÓN DINÁMICA)
                let maxPx = 45;
                projectClips.forEach(c => { let end = c.startPx + c.widthPx; if(end > maxPx) maxPx = end; });

                playInterval = setInterval(() => {
                    globalTime++; playheadX = 45 + (globalTime * (pixelsPerSecond/10));
                    document.getElementById('playhead').style.left = playheadX + 'px';
                    updateTimecode();
                    document.getElementById('timelineScroll').scrollLeft = playheadX - 100;

                    // Si está exportando y llega al último clip, detener automáticamente
                    if(isExporting && playheadX >= maxPx) {
                        mainRecorder.stop();
                        togglePlayback();
                    }
                }, 100);
            }
        }

        function resetPlayhead() { 
            globalTime = 0; playheadX = 45; document.getElementById('playhead').style.left = '45px'; 
            updateTimecode(); document.getElementById('timelineScroll').scrollLeft = 0; 
            projectClips.forEach(clip => { if((clip.type === 'video' || clip.type === 'audio') && clip.domElement) clip.domElement.currentTime = clip.offsetPx / pixelsPerSecond; });
        }

        function selectClip(e) {
            if(selectedClipEl) selectedClipEl.classList.remove('selected');
            selectedClipEl = e.currentTarget; selectedClipEl.classList.add('selected');
            const id = selectedClipEl.getAttribute('data-id'); const c = projectClips.find(clip => clip.id == id);
            if(c && (c.type === 'text' || c.type === 'sticker')) document.getElementById('elementSize').value = c.size;
        }

        function deleteSelectedClip() {
            if(selectedClipEl) { 
                const id = selectedClipEl.getAttribute('data-id');
                let clipObj = projectClips.find(c => c.id == id);
                if (clipObj && clipObj.domElement) clipObj.domElement.remove();
                projectClips = projectClips.filter(c => c.id != id);
                selectedClipEl.remove(); selectedClipEl = null; 
            }
        }

        function addMediaToTimeline(event) {
            initAudio(); const file = event.target.files[0]; if (!file) return;
            const isVideo = file.type.startsWith('video/'); const url = URL.createObjectURL(file);
            const clipId = Date.now();
            
            const clipUi = document.createElement('div');
            clipUi.className = `clip-block ${isVideo ? '' : 'image'}`;
            clipUi.style.left = playheadX + 'px'; clipUi.style.width = '150px'; 
            clipUi.setAttribute('data-id', clipId);
            clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-${isVideo ? 'film' : 'image'}"></i> &nbsp;${file.name.substring(0,8)}</div>`;
            
            makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId);
            clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
            document.getElementById(isVideo ? 'videoTrack' : 'imageTrack').appendChild(clipUi);

            let mediaElement;
            if(isVideo) {
                mediaElement = document.createElement('video');
                mediaElement.src = url; mediaElement.playsInline = true; mediaElement.crossOrigin = "anonymous";
                mediaContainer.appendChild(mediaElement);
                mediaElement.oncanplay = () => {
                    if (!mediaElement.hasAudioConnected) {
                        try {
                            const source = audioCtx.createMediaElementSource(mediaElement);
                            source.connect(audioCtx.destination); source.connect(audioMixer); 
                            mediaElement.hasAudioConnected = true;
                        } catch(e) {} 
                    }
                };
            } else { mediaElement = new Image(); mediaElement.src = url; }

            projectClips.push({ id: clipId, type: isVideo ? 'video' : 'image', startPx: playheadX, widthPx: 150, offsetPx: 0, domElement: mediaElement });
            playheadX += 160; document.getElementById('playhead').style.left = playheadX + 'px'; updateTimecode();
        }

        function makeDraggable(element, isPlayhead = false, clipId = null) {
            let startX = 0, currentLeft = 0;
            const dragTarget = isPlayhead ? element : element.querySelector('.drag-area');
            function dragStart(e) {
                if(isPlaying) togglePlayback(); e.preventDefault();
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                currentLeft = parseInt(element.style.left || 45);
                document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove, {passive: false});
                document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd);
            }
            function dragMove(e) {
                e.preventDefault(); let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let newLeft = currentLeft + (x - startX);
                if(newLeft < 45) newLeft = 45; element.style.left = newLeft + 'px';
                if(isPlayhead) {
                    playheadX = newLeft; globalTime = Math.floor((newLeft - 45) / (pixelsPerSecond/10)); updateTimecode();
                    projectClips.forEach(c => {
                        if((c.type === 'video' || c.type === 'audio') && c.domElement && newLeft >= c.startPx && newLeft <= c.startPx + c.widthPx) {
                            let mediaTime = ((newLeft - c.startPx) + c.offsetPx) / pixelsPerSecond;
                            if(mediaTime >= 0) c.domElement.currentTime = mediaTime;
                        }
                    });
                } else if (clipId) {
                    let clipObj = projectClips.find(c => c.id == clipId); if(clipObj) clipObj.startPx = newLeft;
                }
            }
            function dragEnd(e) {
                document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove);
                document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd);
            }
            dragTarget.addEventListener('mousedown', dragStart); dragTarget.addEventListener('touchstart', dragStart, {passive: false});
        }
        makeDraggable(document.getElementById('playhead'), true);

        function makeResizable(clipUi, clipId) {
            const handle = document.createElement('div'); handle.className = 'resize-handle'; clipUi.appendChild(handle);
            let isResizing = false; let startX = 0; let startWidth = 0;
            function resizeStart(e) {
                e.stopPropagation(); isResizing = true;
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                startWidth = parseInt(clipUi.style.width, 10);
                document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', resizeMove, {passive: false});
                document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', resizeEnd);
            }
            function resizeMove(e) {
                if (!isResizing) return; e.preventDefault();
                let currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let newWidth = startWidth + (currentX - startX);
                if (newWidth < 30) newWidth = 30; clipUi.style.width = newWidth + 'px';
                let clipObj = projectClips.find(c => c.id == clipId); if (clipObj) clipObj.widthPx = newWidth;
            }
            function resizeEnd(e) {
                isResizing = false;
                document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', resizeMove);
                document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', resizeEnd);
            }
            handle.addEventListener('mousedown', resizeStart); handle.addEventListener('touchstart', resizeStart, {passive: false});
        }

        // --- GRABACIÓN VOZ EN OFF Y CÁMARA PIP (Igual que V9) ---
        let isRecordingVoice = false; let voiceStream; let voiceRecorder; let voiceChunks = [];
        async function toggleVoiceRecord() {
            initAudio(); const btn = document.getElementById('btnRecVoice'); const badge = document.getElementById('recBadge');
            if (!isRecordingVoice) {
                try {
                    voiceStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                    voiceChunks = []; voiceRecorder = new MediaRecorder(voiceStream);
                    voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
                    voiceRecorder.onstop = () => {
                        const clipId = Date.now();
                        const clipUi = document.createElement('div'); clipUi.className = 'clip-block audio'; clipUi.style.left = playheadX + 'px'; clipUi.style.width = '120px'; clipUi.setAttribute('data-id', clipId); 
                        clipUi.innerHTML = `<div class="drag-area"><i class="fa-solid fa-microphone"></i> &nbsp;Voz_Off</div>`;
                        makeDraggable(clipUi, false, clipId); makeResizable(clipUi, clipId); 
                        clipUi.addEventListener('mousedown', selectClip); clipUi.addEventListener('touchstart', selectClip, {passive: true});
                        document.getElementById('audioTrack').appendChild(clipUi);
                        const blob = new Blob(voiceChunks, { type: 'audio/webm' }); const audioUrl = URL.createObjectURL(blob); const audioEl = document.createElement('audio'); audioEl.src = audioUrl; mediaContainer.appendChild(audioEl);
                        const source = audioCtx.createMediaElementSource(audioEl); source.connect(audioCtx.destination); source.connect(audioMixer);
                        projectClips.push({ id: clipId, type: 'audio', startPx: playheadX, widthPx: 120, offsetPx: 0, domElement: audioEl });
                        voiceStream.getTracks().forEach(t => t.stop());
                    };
                    voiceRecorder.start(); isRecordingVoice = true; btn.classList.add('danger'); btn.innerHTML = '<i class="fa-solid fa-stop"></i> Detener Grabación'; badge.innerHTML = 'GRABANDO VOZ'; badge.style.display = 'block';
                    if(!isPlaying) togglePlayback(); 
                } catch(e) { alert("Permite acceso al micrófono."); }
            } else {
                voiceRecorder.stop(); isRecordingVoice = false; if(isPlaying) togglePlayback(); btn.classList.remove('danger'); btn.innerHTML = '<i class="fa-solid fa-microphone"></i> Iniciar Grabación de Voz'; badge.style.display = 'none';
            }
        }
        async function toggleCamera() {
            if(!isCamActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "user"}, audio: false });
                    hiddenCam.srcObject = stream; isCamActive = true;
                    document.getElementById('btnToggleCam').classList.add('danger'); document.getElementById('btnToggleCam').innerHTML = '<i class="fa-solid fa-video-slash"></i> Apagar Cámara'; document.getElementById('camMode').value = "pip"; 
                } catch(e) { alert("Permite acceso a cámara."); }
            } else {
                let stream = hiddenCam.srcObject; if(stream) stream.getTracks().forEach(t => t.stop()); isCamActive = false;
                document.getElementById('btnToggleCam').classList.remove('danger'); document.getElementById('btnToggleCam').innerHTML = '<i class="fa-solid fa-video"></i> Activar Cámara (Sin Audio)'; document.getElementById('camMode').value = "none";
            }
        }
        function updateCamSettings() { if(document.getElementById('camMode').value !== 'none' && !isCamActive) toggleCamera(); }

        // --- EXPORTAR DINÁMICO ---
        let mainRecorder; let exportChunks = [];
        function exportVideo() {
            initAudio();
            if(projectClips.length === 0) return alert("Agrega medios antes de exportar.");
            if(selectedClipEl) selectedClipEl.classList.remove('selected'); selectedClipEl = null; 
            if(exportChunks.length > 0) exportChunks = [];
            
            const finalStream = canvas.captureStream(30);
            if (audioMixer && audioMixer.stream.getAudioTracks().length > 0) finalStream.addTrack(audioMixer.stream.getAudioTracks()[0]);

            try { mainRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm;codecs=vp9,opus' }); } 
            catch (e) { mainRecorder = new MediaRecorder(finalStream); }

            mainRecorder.ondataavailable = e => { if (e.data.size > 0) exportChunks.push(e.data); };
            mainRecorder.onstop = () => {
                isExporting = false;
                const blob = new Blob(exportChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.style.display = 'none';
                a.href = url; a.download = `CapacitiumX_Produccion_${Date.now()}.webm`;
                document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
                document.getElementById('recBadge').style.display = 'none';
                document.getElementById('btnExport').innerHTML = '<i class="fa-solid fa-download"></i> EXPORTAR';
                alert("¡Exportación completada!");
            };

            resetPlayhead();
            isExporting = true;
            document.getElementById('recBadge').innerHTML = "EXPORTANDO..."; document.getElementById('recBadge').style.display = 'block';
            document.getElementById('btnExport').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESANDO...';
            
            mainRecorder.start(); togglePlayback(); 
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); event.currentTarget.classList.add('active');
        }
    </script>
