<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapacitiumX Pro Editor V5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #3b82f6; --bg: #09090b; --panel: #18181b; --track-bg: #27272a; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; user-select: none; }

        .app-header { background: var(--panel); padding: 12px 16px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; font-weight: 600; font-size: 14px; align-items: center; }
        .btn-save { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; }
        
        .preview-area { background: #000; display: flex; justify-content: center; padding: 10px; height: 30vh; border-bottom: 1px solid #333; position: relative; }
        canvas { max-width: 100%; max-height: 100%; border-radius: 8px; background: #111; object-fit: contain; }
        .status-rec { position: absolute; top: 15px; right: 20px; background: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: none; animation: pulse 1.5s infinite; z-index: 50; }

        /* TOOLBAR Y REPRODUCTOR */
        .timeline-editor { background: var(--panel); display: flex; flex-direction: column; height: 35vh; border-bottom: 1px solid #333; }
        .timeline-toolbar { display: flex; gap: 15px; padding: 10px 12px; background: #000; font-size: 14px; align-items: center; }
        .action-btn { cursor: pointer; color: #a1a1aa; padding: 5px; transition: 0.2s; }
        .action-btn:hover { color: white; }
        .action-btn.active-play { color: #10b981; }

        /* PISTAS DE EDICIÓN */
        .tracks-container { flex: 1; padding: 10px 0; overflow-x: auto; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; position: relative; }
        .track { height: 40px; background: var(--track-bg); display: flex; position: relative; min-width: 300vw; border-bottom: 1px solid #333; }
        .track-label { position: sticky; left: 0; background: #111; width: 45px; display: flex; justify-content: center; align-items: center; font-size: 10px; z-index: 30; border-right: 1px solid #555; flex-direction: column; color: #aaa; }
        
        /* CABEZAL ROJO */
        .playhead-container { position: absolute; top: 0; bottom: 0; left: 45px; width: 20px; z-index: 40; transform: translateX(-10px); cursor: ew-resize; }
        .playhead-line { position: absolute; left: 10px; width: 2px; height: 100%; background: #ef4444; pointer-events: none; }
        .playhead-head { position: absolute; left: 5px; top: 0; width: 12px; height: 12px; background: #ef4444; clip-path: polygon(0 0, 100% 0, 50% 100%); pointer-events: none; }

        /* CLIPS ARRASTRABLES */
        .clip-block { position: absolute; height: 90%; top: 5%; background: #3b82f6; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: bold; cursor: grab; opacity: 0.9; overflow: hidden; white-space: nowrap; border: 1px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 20; }
        .clip-block.image { background: #f59e0b; border-color: #fbbf24; }
        .clip-block.audio { background: #10b981; border-color: #34d399; }
        .clip-block.selected { border: 2px solid white; opacity: 1; z-index: 25; }
        .clip-block:active { cursor: grabbing; }

        /* PANELES INFERIORES */
        .control-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .tab-menu { display: flex; background: var(--panel); overflow-x: auto; border-bottom: 1px solid #333; }
        .tab-btn { padding: 12px 16px; font-size: 12px; color: #a1a1aa; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--neon); }
        .tab-content { flex: 1; padding: 15px; display: none; flex-direction: column; gap: 10px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .btn { background: #27272a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; font-size: 12px; text-align: center; cursor: pointer; font-weight: bold; }
        .btn.primary { background: var(--neon); border: none; }
        .btn.danger { background: #ef4444; border: none; }
        select, input[type="range"] { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; font-size: 12px; width: 100%; box-sizing: border-box; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-header">
        <span><i class="fa-solid fa-film"></i> Estudio Pro V5</span>
        <button class="btn-save" onclick="exportVideo()"><i class="fa-solid fa-download"></i> EXPORTAR</button>
    </div>

    <!-- MONITOR DE VIDEO -->
    <div class="preview-area">
        <div class="status-rec" id="recBadge">GRABANDO VOZ</div>
        <canvas id="mainCanvas"></canvas>
        <video id="hiddenCam" autoplay playsinline style="display:none;" muted></video>
        <video id="hiddenVideo" playsinline crossorigin="anonymous" style="display:none;"></video>
    </div>

    <!-- LÍNEA DE TIEMPO -->
    <div class="timeline-editor">
        <div class="timeline-toolbar">
            <i class="fa-solid fa-play action-btn" id="btnPlay" onclick="togglePlayback()" title="Reproducir"></i>
            <i class="fa-solid fa-backward action-btn" onclick="resetPlayhead()" title="Al inicio"></i>
            <div style="width: 1px; height: 15px; background: #555; margin: 0 10px;"></div>
            <i class="fa-solid fa-trash action-btn" onclick="deleteSelectedClip()" title="Borrar Seleccionado"></i>
            <span id="timecode" style="margin-left: auto; font-family: monospace; color: #10b981;">00:00.0</span>
        </div>
        
        <div class="tracks-container" id="timelineScroll">
            <div class="playhead-container" id="playhead">
                <div class="playhead-head"></div>
                <div class="playhead-line"></div>
            </div>
            
            <div class="track" id="videoTrack">
                <div class="track-label"><i class="fa-solid fa-video"></i> Vid</div>
            </div>
            <div class="track" id="imageTrack">
                <div class="track-label"><i class="fa-solid fa-image"></i> Img</div>
            </div>
            <div class="track" id="audioTrack">
                <div class="track-label"><i class="fa-solid fa-microphone"></i> Voz</div>
            </div>
        </div>
    </div>

    <!-- CONSOLA DE HERRAMIENTAS -->
    <div class="control-panel">
        <div class="tab-menu">
            <div class="tab-btn active" onclick="switchTab('media')"><i class="fa-solid fa-folder-open"></i> Medios</div>
            <div class="tab-btn" onclick="switchTab('voice')"><i class="fa-solid fa-microphone"></i> Voz en Off</div>
            <div class="tab-btn" onclick="switchTab('camera')"><i class="fa-solid fa-camera"></i> Cámara (PiP)</div>
        </div>

        <!-- PESTAÑA 1: MEDIOS (IMAGEN/VIDEO) -->
        <div id="media" class="tab-content active">
            <div class="btn primary" onclick="document.getElementById('fileUpload').click()"><i class="fa-solid fa-plus"></i> Importar Foto / Video</div>
            <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none;" onchange="addMediaToTimeline(event)">
            <p style="font-size: 11px; color: #888; text-align: center;">Toca un clip para seleccionarlo. Arrástralo para ajustar los tiempos.</p>
        </div>

        <!-- PESTAÑA 2: VOZ EN OFF INDEPENDIENTE -->
        <div id="voice" class="tab-content">
            <label style="font-size: 11px; color: #aaa; text-align: center;">Micrófono Podcast (Aislamiento de fondo activado)</label>
            <div class="btn primary" id="btnRecVoice" onclick="toggleVoiceRecord()" style="padding: 16px;"><i class="fa-solid fa-microphone"></i> Iniciar Grabación de Voz</div>
            <p style="font-size: 10px; color: #10b981; text-align: center;">* El audio grabado se añadirá automáticamente a la pista "Voz".</p>
        </div>

        <!-- PESTAÑA 3: CÁMARA PIP Y FONDO VIRTUAL -->
        <div id="camera" class="tab-content">
            <div class="btn primary" id="btnToggleCam" onclick="toggleCamera()"><i class="fa-solid fa-video"></i> Activar Cámara (Sin Audio)</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <div>
                    <label style="font-size: 11px; color: #aaa;">Ubicación</label>
                    <select id="camMode" onchange="updateCamSettings()">
                        <option value="none">Oculta</option>
                        <option value="pip">Miniatura PiP</option>
                        <option value="full">Pantalla Completa</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 11px; color: #aaa;">Fondo Virtual</label>
                    <select id="camBg" onchange="updateCamSettings()">
                        <option value="none">Mi fondo real</option>
                        <option value="neon">Estudio Neon</option>
                        <option value="dark">Set Premium</option>
                    </select>
                </div>
            </div>
            <label style="font-size: 11px; color: #aaa; margin-top: 5px;">Recorte de Chroma Key (Mueve esto si usas Fondo Virtual)</label>
            <input type="range" id="chromaTol" min="0" max="150" value="60">
        </div>
    </div>

    <script>
        // --- 1. MOTOR GRÁFICO (CANVAS Y SOLUCIÓN BUG IMAGEN) ---
        const canvas = document.getElementById('mainCanvas'); 
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;
        
        const hiddenCam = document.getElementById('hiddenCam');
        const hiddenVideo = document.getElementById('hiddenVideo');
        hiddenVideo.volume = 1.0; // Asegurar que el video suene
        
        let currentImage = null;
        let isCamActive = false;

        function renderLoop() {
            ctx.fillStyle = "#18181b"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // CORRECCIÓN: Si hay video, dibujarlo siempre que esté cargado (incluso pausado).
            // Si no hay video, pero hay imagen, dibujar imagen.
            if (hiddenVideo.src && hiddenVideo.readyState >= 2) {
                ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
            } else if (currentImage) {
                ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "white"; ctx.font = "24px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("Importa una Foto o Video", canvas.width/2, canvas.height/2);
            }

            // DIBUJAR CÁMARA Y FONDO VIRTUAL (CHROMA KEY)
            if (isCamActive && hiddenCam.readyState >= 2) {
                const mode = document.getElementById('camMode').value;
                const bg = document.getElementById('camBg').value;
                
                if (mode !== 'none') {
                    let camW = mode === 'full' ? canvas.width : 400;
                    let camH = mode === 'full' ? canvas.height : 300;
                    let camX = mode === 'full' ? 0 : canvas.width - camW - 20;
                    let camY = mode === 'full' ? 0 : canvas.height - camH - 20;

                    if(mode === 'full' && bg !== 'none') {
                        if (bg === 'neon') {
                            let grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width);
                            grd.addColorStop(0, '#16092b'); grd.addColorStop(1, '#020007');
                            ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
                        } else if (bg === 'dark') {
                            ctx.fillStyle = '#141416'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                    }

                    if (bg !== 'none') {
                        let tempCanvas = document.createElement('canvas');
                        tempCanvas.width = camW; tempCanvas.height = camH;
                        let tCtx = tempCanvas.getContext('2d');
                        tCtx.drawImage(hiddenCam, 0, 0, camW, camH);
                        
                        let frame = tCtx.getImageData(0, 0, camW, camH);
                        let tol = parseInt(document.getElementById('chromaTol').value);
                        
                        for (let i = 0; i < frame.data.length / 4; i++) {
                            let r = frame.data[i * 4];
                            let g = frame.data[i * 4 + 1];
                            let b = frame.data[i * 4 + 2];
                            if (g > tol && g > r * 1.1 && g > b * 1.1) {
                                frame.data[i * 4 + 3] = 0; 
                            }
                        }
                        tCtx.putImageData(frame, 0, 0);
                        ctx.drawImage(tempCanvas, camX, camY);
                    } else {
                        ctx.drawImage(hiddenCam, camX, camY, camW, camH);
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // --- 2. LÍNEA DE TIEMPO Y REPRODUCCIÓN (PLAY/PAUSA) ---
        let selectedClipEl = null; let globalTime = 0; let isPlaying = false; let playInterval;
        let playheadX = 45; const pixelsPerSecond = 20; 

        function updateTimecode() { 
            let secs = Math.floor(globalTime / 10);
            let decs = globalTime % 10;
            document.getElementById('timecode').innerText = `00:${secs.toString().padStart(2,'0')}.${decs}`; 
        }

        function togglePlayback() {
            const btn = document.getElementById('btnPlay');
            if (isPlaying) {
                clearInterval(playInterval); isPlaying = false;
                btn.classList.remove('fa-pause', 'active-play'); btn.classList.add('fa-play');
                if (hiddenVideo.src) hiddenVideo.pause();
            } else {
                isPlaying = true;
                btn.classList.remove('fa-play'); btn.classList.add('fa-pause', 'active-play');
                if (hiddenVideo.src && hiddenVideo.readyState >= 2) hiddenVideo.play(); // Asegurar reproducción de audio de video
                
                playInterval = setInterval(() => {
                    globalTime++; playheadX = 45 + (globalTime * (pixelsPerSecond/10));
                    document.getElementById('playhead').style.left = playheadX + 'px';
                    updateTimecode();
                    document.getElementById('timelineScroll').scrollLeft = playheadX - 100;
                }, 100);
            }
        }

        function resetPlayhead() { 
            globalTime = 0; playheadX = 45; 
            document.getElementById('playhead').style.left = '45px'; 
            updateTimecode(); document.getElementById('timelineScroll').scrollLeft = 0; 
            if(hiddenVideo.src) hiddenVideo.currentTime = 0;
        }

        function selectClip(e) {
            if(selectedClipEl) selectedClipEl.classList.remove('selected');
            selectedClipEl = e.currentTarget; selectedClipEl.classList.add('selected');
        }

        function deleteSelectedClip() {
            if(selectedClipEl) { 
                selectedClipEl.remove(); selectedClipEl = null; 
                currentImage = null; hiddenVideo.src = "";
            }
        }

        function addMediaToTimeline(event) {
            const file = event.target.files[0]; if (!file) return;
            const isVideo = file.type.startsWith('video/');
            const url = URL.createObjectURL(file);
            
            const clip = document.createElement('div');
            clip.className = `clip-block ${isVideo ? '' : 'image'}`;
            clip.style.left = playheadX + 'px'; clip.style.width = '150px';
            clip.innerHTML = `<i class="fa-solid fa-${isVideo ? 'film' : 'image'}"></i> &nbsp;${file.name.substring(0,10)}`;
            
            makeDraggable(clip);
            clip.addEventListener('mousedown', selectClip); clip.addEventListener('touchstart', selectClip, {passive: true});

            document.getElementById(isVideo ? 'videoTrack' : 'imageTrack').appendChild(clip);

            if(isVideo) {
                hiddenVideo.src = url; hiddenVideo.load(); currentImage = null;
            } else {
                currentImage = new Image(); currentImage.src = url; hiddenVideo.src = "";
            }
        }

        function makeDraggable(element, isPlayhead = false) {
            let startX = 0, currentLeft = 0;
            function dragStart(e) {
                if(isPlaying) togglePlayback(); 
                e.preventDefault();
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                currentLeft = parseInt(element.style.left || 45);
                document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove, {passive: false});
                document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd);
            }
            function dragMove(e) {
                e.preventDefault();
                let x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let newLeft = currentLeft + (x - startX);
                if(newLeft < 45) newLeft = 45; 
                element.style.left = newLeft + 'px';

                if(isPlayhead) {
                    playheadX = newLeft; globalTime = Math.floor((newLeft - 45) / (pixelsPerSecond/10)); updateTimecode();
                    if(hiddenVideo.src && hiddenVideo.duration) hiddenVideo.currentTime = globalTime / 10;
                }
            }
            function dragEnd(e) {
                document.removeEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', dragMove);
                document.removeEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', dragEnd);
            }
            element.addEventListener('mousedown', dragStart); element.addEventListener('touchstart', dragStart, {passive: false});
        }
        makeDraggable(document.getElementById('playhead'), true);


        // --- 3. GRABADORA DE VOZ INDEPENDIENTE (NUEVO) ---
        let isRecordingVoice = false;
        let voiceStream; let voiceRecorder; let voiceChunks = [];

        async function toggleVoiceRecord() {
            const btn = document.getElementById('btnRecVoice');
            const badge = document.getElementById('recBadge');
            
            if (!isRecordingVoice) {
                try {
                    // Pide SOLO el micrófono, con máxima limpieza de ruido
                    voiceStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false } });
                    voiceChunks = [];
                    voiceRecorder = new MediaRecorder(voiceStream);
                    
                    voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
                    voiceRecorder.onstop = () => {
                        // Crear clip en pista de audio
                        const clip = document.createElement('div');
                        clip.className = 'clip-block audio';
                        clip.style.left = playheadX + 'px'; clip.style.width = '120px';
                        clip.innerHTML = `<i class="fa-solid fa-microphone"></i> &nbsp;Voz_Off`;
                        
                        makeDraggable(clip);
                        clip.addEventListener('mousedown', selectClip); clip.addEventListener('touchstart', selectClip, {passive: true});
                        document.getElementById('audioTrack').appendChild(clip);
                        
                        // Apagar micrófono
                        voiceStream.getTracks().forEach(t => t.stop());
                    };

                    voiceRecorder.start();
                    isRecordingVoice = true;
                    btn.classList.add('danger');
                    btn.innerHTML = '<i class="fa-solid fa-stop"></i> Detener Grabación de Voz';
                    badge.innerHTML = 'GRABANDO VOZ'; badge.style.display = 'block';
                    
                    // Si el video está cargado, reproducirlo mientras grabas para que puedas narrarlo
                    if(!isPlaying) togglePlayback();

                } catch(e) { alert("Otorga permisos de micrófono para narrar."); }
            } else {
                voiceRecorder.stop();
                isRecordingVoice = false;
                if(isPlaying) togglePlayback();
                btn.classList.remove('danger');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i> Iniciar Grabación de Voz';
                badge.style.display = 'none';
            }
        }


        // --- 4. CÁMARA WEB (PIP/FONDO VIRTUAL) ---
        async function toggleCamera() {
            if(!isCamActive) {
                try {
                    // Pide SOLO cámara de video (sin audio, porque la voz va por el botón separado)
                    const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "user"}, audio: false });
                    hiddenCam.srcObject = stream; isCamActive = true;
                    
                    document.getElementById('btnToggleCam').classList.add('danger');
                    document.getElementById('btnToggleCam').innerHTML = '<i class="fa-solid fa-video-slash"></i> Apagar Cámara';
                    document.getElementById('camMode').value = "pip"; 
                } catch(e) { alert("Otorga permisos de cámara."); }
            } else {
                let stream = hiddenCam.srcObject;
                if(stream) stream.getTracks().forEach(t => t.stop());
                isCamActive = false;
                document.getElementById('btnToggleCam').classList.remove('danger');
                document.getElementById('btnToggleCam').innerHTML = '<i class="fa-solid fa-video"></i> Activar Cámara (Sin Audio)';
                document.getElementById('camMode').value = "none";
            }
        }

        function updateCamSettings() { if(document.getElementById('camMode').value !== 'none' && !isCamActive) toggleCamera(); }

        // --- EXPORTAR ---
        function exportVideo() {
            alert("Para exportar, la herramienta debe grabar el lienzo. Usa capturadora de pantalla del celular o deja que el motor procese los gráficos.");
            // Lógica de MediaRecorder general iría aquí (similar a V4).
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
